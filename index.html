<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VEDANT PLAYER</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@100;900&family=Playfair+Display:wght@900&family=Bebas+Neue&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Inter;}
body{background:#000;color:#fff;overflow:hidden}

/* ===== DOODLE PORTAL ===== */
#portal{
position:fixed;inset:0;z-index:10000;
background:#fff;
background-image:url('https://ik.imagekit.io/22h7wv5o2/doodle.jpg?updatedAt=1773773281436');
background-size:500px;
display:flex;align-items:center;justify-content:center;
animation:doodleScroll 80s linear infinite;
}

@keyframes doodleScroll{
from{background-position:0 0;}
to{background-position:400px 400px;}
}

/* ===== INK SPREAD MASK ===== */
#portal::after{
content:"";
position:absolute;inset:0;
background:#000;

/* START SMALL INK DOT */
clip-path:circle(0% at 50% 50%);
}

/* 🔥 INK SPREAD ANIMATION */
#portal.ink-active::after{
animation:inkSpread 2.2s cubic-bezier(.7,0,.2,1) forwards;
}

@keyframes inkSpread{
0%{
clip-path:circle(0% at 50% 50%);
filter:blur(20px);
}
30%{
clip-path:circle(30% at 48% 52%);
}
50%{
clip-path:circle(70% at 52% 48%);
}
70%{
clip-path:circle(120% at 47% 53%);
}
100%{
clip-path:circle(150% at 50% 50%);
filter:blur(0px);
}
}

/* ===== VEDANT BUTTON ===== */
.portal-card{
background:#fff;
color:#000;
padding:60px;
border:12px solid #000;
box-shadow:30px 30px 0 #000;
transform:rotate(-6deg) skewX(-4deg);
cursor:pointer;
transition:.4s;
z-index:2;
}
.portal-card:active{
transform:rotate(-4deg) skewX(-2deg) scale(.92);
}

/* ===== APP BG ===== */
.chameleon-bg{
position:fixed;inset:0;z-index:-1;
animation:bgShift 60s infinite;
}
@keyframes bgShift{
0%{background:hsl(0,25%,6%)}
25%{background:hsl(260,25%,6%)}
50%{background:hsl(180,25%,6%)}
75%{background:hsl(90,25%,6%)}
100%{background:hsl(360,25%,6%)}
}

/* ===== APP ===== */
#app{
opacity:0;
transition:2s;
display:flex;
flex-direction:column;
height:100vh;
}

/* ===== HEADER ===== */
header{
padding:60px;
font-size:3rem;
font-weight:900;
}

/* ===== LIST ===== */
.scroll-list{
flex:1;
overflow:auto;
padding:20px;
}

.track-card{
padding:20px;
margin-bottom:12px;
border-radius:20px;
background:rgba(255,255,255,.05);
backdrop-filter:blur(20px);
cursor:pointer;
transition:.2s;
}
.track-card:hover{
transform:scale(1.03);
}

/* ===== PLAYER ===== */
.dock{
position:fixed;
bottom:20px;left:20px;right:20px;
background:rgba(10,10,10,.7);
padding:20px;
border-radius:40px;
backdrop-filter:blur(40px);
}

.controls{
display:flex;
gap:20px;
align-items:center;
}
.shuffle{
cursor:pointer;
font-size:1.4rem;
}
.shuffle.active{
color:#00f2ff;
}

.rail{
height:6px;
background:#333;
border-radius:10px;
cursor:pointer;
}
.fill{
height:100%;
width:0;
background:#fff;
}
</style>
</head>

<body>

<!-- PORTAL -->
<div id="portal">
<div class="portal-card" onclick="ignite()">
<h1 style="font-family:Bebas Neue;font-size:5rem;">VEDANT</h1>
</div>
</div>

<div class="chameleon-bg"></div>

<div id="app">
<header>VEDANT'S PLAYLIST</header>
<div class="scroll-list" id="list"></div>

<div class="dock">
<div class="rail" id="rail"><div class="fill" id="fill"></div></div>

<div style="display:flex;justify-content:space-between;margin-top:15px">
<p id="track-name">---</p>

<div class="controls">
<div id="shuffleBtn" class="shuffle">🔀</div>
<div onclick="prev()">⏮</div>
<div onclick="toggle()">▶</div>
<div onclick="next()">⏭</div>
</div>
</div>
</div>
</div>

<audio id="player"></audio>

<script>
const audio=document.getElementById('player');
let songs=[],currentIdx=0,shuffle=false;

/* ===== INK ENTRY ===== */
function ignite(){
const portal=document.getElementById('portal');

portal.classList.add('ink-active');

/* reveal app mid animation */
setTimeout(()=>{
document.getElementById('app').style.opacity="1";
loadSongs();
},700);

/* remove portal after spread */
setTimeout(()=>{
portal.style.display="none";
},2300);
}

/* ===== SONG FETCH ===== */
async function loadSongs(){
const res=await fetch(`https://api.github.com/repos/forpc1428-eng/SONGS/contents/`);
const data=await res.json();

songs=data.filter(f=>f.name.endsWith('.mp3')).map(f=>({
name:f.name,
url:`https://media.githubusercontent.com/media/forpc1428-eng/SONGS/main/${encodeURIComponent(f.name)}`
}));

renderList();
}

function renderList(){
document.getElementById('list').innerHTML=songs.map((s,i)=>`
<div class="track-card" onclick="playSong(${i})">${s.name}</div>
`).join('');
}

/* ===== PLAYER ===== */
function playSong(i){
currentIdx=i;
audio.src=songs[i].url;
audio.play();
document.getElementById('track-name').innerText=songs[i].name;
}

function toggle(){audio.paused?audio.play():audio.pause();}
function next(){shuffle?playSong(Math.random()*songs.length|0):playSong((currentIdx+1)%songs.length);}
function prev(){playSong((currentIdx-1+songs.length)%songs.length);}

/* ===== SHUFFLE ===== */
document.getElementById('shuffleBtn').onclick=()=>{
shuffle=!shuffle;
document.getElementById('shuffleBtn').classList.toggle('active');
};

/* ===== SEEK ===== */
const rail=document.getElementById('rail');
rail.onmousemove=e=>{
if(e.buttons){
const r=rail.getBoundingClientRect();
audio.currentTime=((e.clientX-r.left)/r.width)*audio.duration;
}
};

audio.ontimeupdate=()=>{
document.getElementById('fill').style.width=(audio.currentTime/audio.duration)*100+"%";
};
</script>

</body>
</html>
