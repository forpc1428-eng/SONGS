<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>V-CORE | PREMIUM AUDIO</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Playfair+Display:wght@900&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #fff; --glass: rgba(255,255,255,0.03); --border: rgba(255,255,255,0.08); }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: #000; color: #fff; height: 100vh; overflow: hidden; }

        /* Cinematic Portal */
        #portal { position: fixed; inset: 0; z-index: 100; background: #000; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: 1.2s cubic-bezier(0.19, 1, 0.22, 1); }
        .v-logo { width: 90px; height: 90px; border: 1px solid rgba(255,255,255,0.3); border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: 0.6s; }
        .v-logo:hover { border-color: #fff; box-shadow: 0 0 40px rgba(255,255,255,0.2); }
        .v-logo span { font-family: 'Playfair Display'; font-size: 2.2rem; }

        /* Main App Interface */
        .container { display: flex; flex-direction: column; height: 100vh; opacity: 0; transform: translateY(20px); transition: 1.5s ease; }
        header { padding: 60px 30px 20px; border-bottom: 1px solid var(--border); }
        header h1 { font-family: 'Playfair Display'; font-size: 2.8rem; letter-spacing: -2px; }

        .list { flex: 1; overflow-y: auto; padding: 20px; padding-bottom: 180px; scrollbar-width: none; }
        .list::-webkit-scrollbar { display: none; }
        
        .track { display: flex; align-items: center; padding: 22px; background: var(--glass); border-radius: 24px; margin-bottom: 12px; border: 1px solid var(--border); transition: 0.4s; cursor: pointer; }
        .track.playing { background: #fff; color: #000; border-color: #fff; transform: scale(0.97); }
        .track-num { opacity: 0.4; font-weight: 900; font-size: 0.7rem; width: 35px; }
        .track.playing .track-num { opacity: 0.7; }
        .track-name { font-weight: 700; font-size: 1rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        /* Player Docking System */
        .dock { position: fixed; bottom: 0; width: 100%; background: rgba(0,0,0,0.9); backdrop-filter: blur(30px); border-top: 1px solid var(--border); padding: 25px 30px 45px; z-index: 10; }
        .progress-bar { width: 100%; height: 3px; background: rgba(255,255,255,0.1); margin-bottom: 25px; border-radius: 5px; cursor: pointer; }
        .progress-fill { height: 100%; background: #fff; width: 0%; border-radius: 5px; transition: width 0.1s linear; box-shadow: 0 0 15px #fff; }
        
        #now-playing { font-family: 'Playfair Display'; font-size: 1.4rem; text-align: center; margin-bottom: 25px; min-height: 1.4rem; }

        .controls { display: flex; justify-content: center; align-items: center; gap: 45px; }
        .ctrl-icon { cursor: pointer; opacity: 0.6; transition: 0.3s; font-size: 1.4rem; }
        .ctrl-icon:hover { opacity: 1; }
        .play-btn { width: 65px; height: 65px; background: #fff; color: #000; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.3rem; cursor: pointer; transition: 0.3s; }
        .play-btn:active { transform: scale(0.9); }
    </style>
</head>
<body>

    <div id="portal" onclick="ignite()">
        <div class="v-logo"><span>V</span></div>
        <p style="margin-top:25px; letter-spacing:8px; font-size:0.6rem; opacity:0.4; font-weight:900;">V-CORE AUDIO SYSTEM</p>
    </div>

    <div class="container" id="app">
        <header>
            <p style="font-size:0.7rem; font-weight:900; opacity:0.3; margin-bottom:8px; letter-spacing:3px;">SYSTEM / CLOUD_SONGS</p>
            <h1>LIBRARY</h1>
        </header>

        <div class="list" id="list">
            <p style="text-align:center; opacity:0.2; margin-top:60px; font-weight:700;">SYNCHRONIZING REPOSITORY...</p>
        </div>

        <div class="dock">
            <div class="progress-bar" onclick="seek(event)"><div class="progress-fill" id="fill"></div></div>
            <p id="now-playing">STANDBY</p>
            <div class="controls">
                <div class="ctrl-icon" onclick="prev()">⏮</div>
                <div class="play-btn" id="playBtn" onclick="toggle()">▶</div>
                <div class="ctrl-icon" onclick="next()">⏭</div>
            </div>
        </div>
    </div>

    <audio id="player" crossorigin="anonymous"></audio>

    <script>
        // CORE CONFIG
        const USER = "forpc1428-eng";
        const REPO = "SONGS";
        const API = `https://api.github.com/repos/${USER}/${REPO}/contents/`;

        const audio = document.getElementById('player');
        let songs = [];
        let currentIdx = -1;

        async function ignite() {
            // Mobile audio unlock
            audio.play().then(() => audio.pause());
            
            const portal = document.getElementById('portal');
            const app = document.getElementById('app');
            
            portal.style.opacity = "0";
            portal.style.transform = "scale(1.1)";
            setTimeout(() => {
                portal.style.display = "none";
                app.style.opacity = "1";
                app.style.transform = "translateY(0)";
            }, 1000);
            
            load();
        }

        async function load() {
            try {
                const res = await fetch(API);
                const data = await res.json();
                
                // Filter and build high-speed Media CDN links
                songs = data
                    .filter(item => item.name.toLowerCase().endsWith('.mp3'))
                    .map(item => ({
                        title: item.name.replace('.mp3', '').replace(/_/g, ' ').replace(/-/g, ' '),
                        // MEDIA CDN URL (The LFS Secret)
                        url: `https://media.githubusercontent.com/media/${USER}/${REPO}/main/${encodeURIComponent(item.name)}`
                    }));
                
                render();
            } catch (err) {
                document.getElementById('list').innerHTML = `<p style="color:red; text-align:center;">SYNC ERROR: ${err}</p>`;
            }
        }

        function render() {
            const list = document.getElementById('list');
            list.innerHTML = songs.map((s, i) => `
                <div class="track ${i === currentIdx ? 'playing' : ''}" onclick="playSong(${i})">
                    <div class="track-num">${(i+1).toString().padStart(2, '0')}</div>
                    <div class="track-name">${s.title}</div>
                </div>
            `).join('');
        }

        function playSong(idx) {
            if(idx < 0 || idx >= songs.length) return;
            currentIdx = idx;
            const song = songs[idx];
            
            document.getElementById('now-playing').innerText = song.title;
            document.getElementById('playBtn').innerText = "⏸";
            
            audio.src = song.url;
            audio.load();
            audio.play().catch(e => {
                console.error("LFS Stream blocked or missing:", e);
                document.getElementById('now-playing').innerText = "STREAM ERROR";
            });
            
            render();
        }

        function toggle() {
            if (currentIdx === -1) { playSong(0); return; }
            if (audio.paused) { audio.play(); document.getElementById('playBtn').innerText = "⏸"; }
            else { audio.pause(); document.getElementById('playBtn').innerText = "▶"; }
        }

        function next() { playSong((currentIdx + 1) % songs.length); }
        function prev() { playSong((currentIdx - 1 + songs.length) % songs.length); }

        function seek(e) {
            const rect = e.target.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const p = x / rect.width;
            audio.currentTime = p * audio.duration;
        }

        audio.ontimeupdate = () => {
            if (audio.duration) {
                const p = (audio.currentTime / audio.duration) * 100;
                document.getElementById('fill').style.width = p + "%";
            }
        };
        
        audio.onended = () => next();
    </script>
</body>
</html>
