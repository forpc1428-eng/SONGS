<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VEDANT | DIRECT ACCESS</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Playfair+Display:wght@900&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #000; --glass: rgba(255,255,255,0.05); --border: rgba(255,255,255,0.1); }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-font-smoothing: antialiased; }
        body { background: var(--bg); color: #fff; font-family: 'Inter', sans-serif; overflow: hidden; height: 100vh; }

        /* MOURGAN HEADER */
        header { padding: 40px 20px 20px; border-bottom: 1px solid var(--border); }
        h1 { font-family: 'Playfair Display'; font-size: 2.5rem; letter-spacing: -1px; background: linear-gradient(#fff, #666); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        /* THE FOLDER LIST */
        .song-list { height: calc(100vh - 220px); overflow-y: auto; padding: 20px; }
        .track { 
            display: flex; align-items: center; padding: 15px; background: var(--glass); 
            border-radius: 12px; margin-bottom: 10px; border: 1px solid transparent; transition: 0.2s;
        }
        .track.active { border-color: #fff; background: rgba(255,255,255,0.1); }
        .track-info { flex: 1; overflow: hidden; margin-left: 15px; }
        .track-name { font-weight: 700; font-size: 0.95rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        
        /* DOCK PLAYER */
        .dock { 
            position: fixed; bottom: 0; width: 100%; background: #0a0a0a; 
            border-top: 1px solid var(--border); padding: 20px; height: 140px;
        }
        .controls { display: flex; align-items: center; justify-content: center; gap: 30px; margin-top: 10px; }
        .btn { cursor: pointer; opacity: 0.8; transition: 0.2s; font-size: 1.5rem; }
        .btn:active { transform: scale(0.8); opacity: 1; }
        .main-btn { width: 60px; height: 60px; background: #fff; color: #000; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.8rem; }
        
        .progress-container { width: 100%; height: 4px; background: rgba(255,255,255,0.1); border-radius: 2px; margin-bottom: 15px; position: relative; cursor: pointer; }
        .progress-bar { height: 100%; background: #fff; width: 0%; border-radius: 2px; box-shadow: 0 0 10px #fff; }
    </style>
</head>
<body>

<header>
    <h1>VEDANT</h1>
    <p style="font-size: 0.7rem; letter-spacing: 5px; opacity: 0.4;">DRIVE ARCHIVE v1.0</p>
</header>

<div class="song-list" id="songList">
    <p style="text-align: center; margin-top: 50px; opacity: 0.3;">CONNECTING TO DRIVE...</p>
</div>

<div class="dock">
    <div class="progress-container" id="progCont">
        <div class="progress-bar" id="progBar"></div>
    </div>
    
    <div style="text-align: center; margin-bottom: 10px;">
        <p id="nowPlaying" style="font-size: 0.85rem; font-weight: 700; opacity: 0.8;">Select a track</p>
    </div>

    <div class="controls">
        <div class="btn" onclick="prev()">⏮</div>
        <div class="btn main-btn" id="playBtn" onclick="togglePlay()">▶</div>
        <div class="btn" onclick="next()">⏭</div>
    </div>
</div>

<audio id="player"></audio>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwwYEAgMQTV5yulcPTnFwt2-lVzJOXxJU88G5x3ZcmaTzfi4uOzl81kcAlzqj_yhObg/exec";
    const audio = document.getElementById('player');
    let songs = [];
    let currentIndex = -1;

    // FETCH DATA
    async function loadData() {
        try {
            const response = await fetch(SCRIPT_URL);
            songs = await response.json();
            renderList();
        } catch (e) {
            document.getElementById('songList').innerHTML = `<p style="color:red; text-align:center;">ERROR: CHECK SCRIPT DEPLOYMENT</p>`;
        }
    }

    function renderList() {
        document.getElementById('songList').innerHTML = songs.map((s, i) => `
            <div class="track" id="t-${i}" onclick="playSong(${i})">
                <div style="font-weight:900; opacity:0.2;">${(i+1).toString().padStart(2, '0')}</div>
                <div class="track-info">
                    <div class="track-name">${s.name.replace('.mp3', '')}</div>
                </div>
            </div>
        `).join('');
    }

    function playSong(index) {
        if (index < 0 || index >= songs.length) return;
        currentIndex = index;
        
        // UI Updates
        document.querySelectorAll('.track').forEach(t => t.classList.remove('active'));
        document.getElementById(`t-${index}`).classList.add('active');
        document.getElementById('nowPlaying').innerText = songs[index].name.replace('.mp3', '');
        document.getElementById('playBtn').innerText = "⏸";

        // Audio Logic
        const url = songs[index].link;
        // Bypassing proxy errors by using the Direct Export link if available
        const fileId = url.split('id=')[1]?.split('&')[0];
        audio.src = fileId ? `https://docs.google.com/uc?export=download&id=${fileId}` : url;
        
        audio.play().catch(e => {
            console.log("Playback blocked - tap play button");
        });
    }

    function togglePlay() {
        if (currentIndex === -1) { playSong(0); return; }
        if (audio.paused) { audio.play(); document.getElementById('playBtn').innerText = "⏸"; }
        else { audio.pause(); document.getElementById('playBtn').innerText = "▶"; }
    }

    function next() { playSong((currentIndex + 1) % songs.length); }
    function prev() { playSong((currentIndex - 1 + songs.length) % songs.length); }

    // Progress Logic
    audio.ontimeupdate = () => {
        const p = (audio.currentTime / audio.duration) * 100;
        document.getElementById('progBar').style.width = p + "%";
    };
    
    // Seek logic
    document.getElementById('progCont').onclick = (e) => {
        const rect = e.target.getBoundingClientRect();
        const x = e.clientX - rect.left;
        const width = rect.right - rect.left;
        audio.currentTime = (x / width) * audio.duration;
    };

    // Auto-next
    audio.onended = () => next();

    loadData();
</script>

</body>
</html>
