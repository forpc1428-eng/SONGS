<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>VEDANT'S PLAYLIST | DOODLE EDITION</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@800&family=Playfair+Display:ital,wght@1,900&family=Bebas+Neue&family=Montserrat:wght@900&family=Space+Mono:ital,wght@1,700&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #00f2ff; --glass: rgba(255, 255, 255, 0.05); }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; -webkit-tap-highlight-color: transparent; }
        
        body { background: #000; color: #fff; height: 100vh; overflow: hidden; position: fixed; width: 100%; }

        /* --- STAGE 1: DOODLE LANDING --- */
        #portal {
            position: fixed; inset: 0; z-index: 10000;
            background-color: #fff;
            /* Using your attached style as a repeating background */
            background-image: url('https://st3.depositphotos.com/1006597/15121/v/450/depositphotos_151212850-stock-illustration-doodle-monsters-seamless-pattern.jpg');
            background-size: 500px;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: clip-path 1.8s cubic-bezier(0.77, 0, 0.175, 1);
            clip-path: circle(150% at 50% 50%);
            animation: doodleScroll 60s linear infinite;
        }

        @keyframes doodleScroll {
            from { background-position: 0 0; }
            to { background-position: 500px 500px; }
        }

        .portal-content {
            background: #fff; padding: 40px; border: 8px solid #000;
            text-align: center; box-shadow: 20px 20px 0px #000;
            transform: rotate(-2deg); cursor: pointer;
        }

        .portal-content h2 { color: #000; font-family: 'Bebas Neue'; font-size: 3rem; letter-spacing: 5px; }

        .melt-exit { clip-path: circle(0% at 50% 50%) !important; }

        /* --- STAGE 2: CHAMELEON ENVIRONMENT --- */
        .chameleon-bg {
            position: fixed; inset: 0; z-index: -2;
            background: linear-gradient(45deg, #0f0c29, #302b63, #24243e);
            animation: colorShift 15s infinite alternate;
        }
        @keyframes colorShift {
            0% { filter: hue-rotate(0deg) brightness(0.4); }
            50% { filter: hue-rotate(180deg) brightness(0.6); }
            100% { filter: hue-rotate(360deg) brightness(0.4); }
        }
        .vignette {
            position: fixed; inset: 0; z-index: -1;
            background: radial-gradient(circle, transparent 20%, rgba(0,0,0,0.9) 100%);
            pointer-events: none;
        }

        /* --- SHAPESHIFTING HEADER --- */
        header { padding: 60px 30px 20px; position: relative; z-index: 100; }

        .shapeshifter {
            font-size: clamp(2.5rem, 8vw, 3.5rem); line-height: 0.85;
            background: linear-gradient(to bottom, #fff, rgba(255,255,255,0.3));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            animation: fontCycle 12s infinite;
        }

        @keyframes fontCycle {
            0%, 20% { font-family: 'Playfair Display'; font-style: italic; letter-spacing: -2px; }
            21%, 40% { font-family: 'Bebas Neue'; letter-spacing: 5px; font-weight: 400; }
            41%, 60% { font-family: 'Space Mono'; font-style: italic; letter-spacing: -1px; }
            61%, 80% { font-family: 'Montserrat'; letter-spacing: -3px; font-weight: 900; }
            81%, 100% { font-family: 'Plus Jakarta Sans'; letter-spacing: 0px; font-weight: 800; }
        }

        /* --- UI ENGINE --- */
        .container { display: flex; flex-direction: column; height: 100vh; opacity: 0; transition: 1.5s; }
        .scroll-area { flex: 1; overflow-y: auto; padding: 0 20px 240px; scrollbar-width: none; }
        .scroll-area::-webkit-scrollbar { display: none; }

        .track-card {
            background: var(--glass); border: 1px solid rgba(255,255,255,0.1);
            border-radius: 24px; padding: 22px; margin-bottom: 12px;
            backdrop-filter: blur(25px); transition: 0.3s;
            display: flex; align-items: center; gap: 15px; cursor: pointer;
        }
        .track-card.active { background: #fff; color: #000; transform: scale(0.97); box-shadow: 0 10px 40px rgba(0,242,255,0.3); }

        /* --- DOCK --- */
        .dock {
            position: fixed; bottom: 25px; left: 15px; right: 15px;
            background: rgba(10, 10, 10, 0.8); backdrop-filter: blur(50px);
            border: 1px solid rgba(255,255,255,0.1); border-radius: 40px;
            padding: 25px; z-index: 1000;
        }
        .bar { width: 100%; height: 6px; background: rgba(255,255,255,0.1); border-radius: 10px; margin-bottom: 15px; cursor: pointer; }
        .fill { height: 100%; width: 0%; background: #fff; border-radius: 10px; box-shadow: 0 0 20px #fff; transition: width 0.1s linear; }
        .controls { display: flex; align-items: center; justify-content: space-between; }
        .play-btn { width: 55px; height: 55px; background: #fff; color: #000; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; }
        
        .q-toast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%) translateY(-100px); background: #fff; color: #000; padding: 12px 25px; border-radius: 50px; font-weight: 800; font-size: 0.75rem; z-index: 11000; transition: 0.5s; }
        .q-toast.show { transform: translateX(-50%) translateY(0); }
    </style>
</head>
<body>

    <div id="q-toast" class="q-toast">QUEUED</div>

    <div id="portal" onclick="ignite()">
        <div class="portal-content">
            <h2>ENTER THE CORE</h2>
            <p style="color:#000; font-weight:900; font-size:0.7rem;">VEDANT'S PLAYLIST</p>
        </div>
    </div>

    <div class="chameleon-bg"></div>
    <div class="vignette"></div>

    <div class="container" id="app">
        <header>
            <p style="font-size: 0.6rem; letter-spacing: 6px; opacity: 0.5; margin-bottom: 10px;">ADAPTIVE SYSTEM v4.0</p>
            <div class="shapeshifter">VEDANT'S<br>PLAYLIST</div>
        </header>

        <div class="scroll-area" id="list"></div>

        <div class="dock">
            <div class="bar" onclick="seek(event)"><div class="fill" id="fill"></div></div>
            <div class="controls">
                <div style="flex:1; overflow:hidden; margin-right:15px;">
                    <p id="song-name" style="font-weight:800; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; font-size:1.1rem;">INITIALIZING...</p>
                    <p id="time" style="font-size:0.7rem; opacity:0.5; font-weight:800; margin-top:4px;">0:00 / 0:00</p>
                </div>
                <div style="display:flex; gap:25px; align-items:center;">
                    <div onclick="prev()" style="font-size:1.5rem">⏮</div>
                    <div class="play-btn" onclick="toggle()" id="play-btn">▶</div>
                    <div onclick="next()" style="font-size:1.5rem">⏭</div>
                </div>
            </div>
        </div>
    </div>

    <audio id="player" crossorigin="anonymous"></audio>

    <script>
        const USER = "forpc1428-eng", REPO = "SONGS";
        const API = `https://api.github.com/repos/${USER}/${REPO}/contents/`;
        const audio = document.getElementById('player');
        let songs = [], currentIdx = -1, queue = [];

        function ignite() {
            document.getElementById('portal').classList.add('melt-exit');
            document.getElementById('app').style.opacity = "1";
            load();
        }

        async function load() {
            const res = await fetch(API);
            const data = await res.json();
            songs = data.filter(f => f.name.endsWith('.mp3')).map(f => ({
                name: f.name.replace('.mp3', '').replace(/_/g, ' '),
                url: `https://media.githubusercontent.com/media/${USER}/${REPO}/main/${encodeURIComponent(f.name)}`
            }));
            render();
        }

        function render() {
            const list = document.getElementById('list');
            list.innerHTML = songs.map((s, i) => `
                <div class="track-card ${i === currentIdx ? 'active' : ''}" 
                     onclick="playSong(${i})" 
                     ontouchstart="ts(event, ${i})" 
                     ontouchmove="tm(event, ${i})" 
                     ontouchend="te(event, ${i})" 
                     id="card-${i}">
                    <div style="font-weight:900; opacity:0.3; font-size:0.75rem;">${(i+1).toString().padStart(2,'0')}</div>
                    <p style="font-weight:800; font-size:0.95rem; flex:1; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">${s.name}</p>
                </div>
            `).join('');
        }

        // --- GESTURE SYSTEM ---
        let sx = 0, cx = 0;
        function ts(e, i) { sx = e.touches[0].clientX; }
        function tm(e, i) { 
            cx = e.touches[0].clientX - sx; 
            if(cx > 0 && cx < 120) document.getElementById(`card-${i}`).style.transform = `translateX(${cx}px)`;
        }
        function te(e, i) {
            if(cx > 80) {
                queue.push(songs[i]);
                const toast = document.getElementById('q-toast');
                toast.innerText = "UP NEXT: " + songs[i].name;
                toast.classList.add('show');
                setTimeout(()=>toast.classList.remove('show'), 2000);
            }
            document.getElementById(`card-${i}`).style.transform = `translateX(0)`;
            cx = 0;
        }

        function playSong(i) {
            currentIdx = i;
            audio.src = songs[i].url;
            audio.play();
            document.getElementById('song-name').innerText = songs[i].name;
            document.getElementById('play-btn').innerText = "⏸";
            render();
        }

        function toggle() { audio.paused ? (audio.play(), document.getElementById('play-btn').innerText="⏸") : (audio.pause(), document.getElementById('play-btn').innerText="▶"); }
        function next() {
            if(queue.length > 0) {
                const s = queue.shift();
                currentIdx = songs.findIndex(x => x.url === s.url);
                playSong(currentIdx);
            } else if(currentIdx < songs.length -1) playSong(currentIdx+1);
        }
        function prev() { if(currentIdx > 0) playSong(currentIdx-1); }
        function seek(e) { 
            const rect = document.querySelector('.bar').getBoundingClientRect();
            audio.currentTime = ((e.clientX - rect.left) / rect.width) * audio.duration; 
        }

        audio.ontimeupdate = () => {
            const p = (audio.currentTime / audio.duration) * 100;
            document.getElementById('fill').style.width = p + "%";
            document.getElementById('time').innerText = `${fmt(audio.currentTime)} / ${fmt(audio.duration || 0)}`;
        };
        const fmt = (s) => `${Math.floor(s/60)}:${Math.floor(s%60).toString().padStart(2,'0')}`;
        audio.onended = () => next();
    </script>
</body>
</html>
