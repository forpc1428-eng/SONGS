<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VEDANT PLAYER</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@100;900&family=Playfair+Display:wght@900&family=Orbitron&display=swap" rel="stylesheet">

<link rel="stylesheet" href="style.css">

<!-- PWA -->
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#000000">

</head>

<body>

<div id="portal" onclick="ignite()">
    <div class="portal-card">
        <h1>VEDANT</h1>
        <p>ENTER</p>
    </div>
</div>

<div id="app" class="hidden">

    <canvas id="scene"></canvas>

    <header>
        <h1 id="title">VEDANT PLAYER</h1>
    </header>

    <div id="list" class="list"></div>

    <div class="player">
        <h2 id="track-name">---</h2>

        <div class="controls">
            <button onclick="prev()">⏮</button>
            <button onclick="toggle()" id="play-btn">▶</button>
            <button onclick="next()">⏭</button>
        </div>

        <div class="progress" onclick="seek(event)">
            <div id="fill"></div>
        </div>
    </div>

</div>

<audio id="audio"></audio>

<script type="module" src="main.js"></script>
</body>
</html>
