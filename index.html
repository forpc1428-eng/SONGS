<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>VEDANT'S PLAYLIST</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:slnt,wght@-10,100..900&family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Fraunces:ital,opsz,wght@0,9..144,100..900;1,9..144,100..900&family=Bebas+Neue&display=swap" rel="stylesheet">
    
    <style>
        :root { 
            --accent: #00f2ff; 
            --glass: rgba(255, 255, 255, 0.03); 
            --border: rgba(255, 255, 255, 0.08); 
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        
        body { 
            background: #000; color: #fff; height: 100vh; overflow: hidden; 
            position: fixed; width: 100%; 
        }

        /* --- 1. THE DOODLE PORTAL --- */
        #portal {
            position: fixed; inset: 0; z-index: 10000; background: #fff;
            background-image: url('https://ik.imagekit.io/22h7wv5o2/doodle.jpg?updatedAt=1773773281436');
            background-size: 500px;
            display: flex; align-items: center; justify-content: center;
            transition: clip-path 2.2s cubic-bezier(0.8, 0, 0.2, 1); 
            clip-path: circle(150% at 50% 50%);
            animation: doodleScroll 80s linear infinite;
        }
        @keyframes doodleScroll { from {background-position:0 0;} to {background-position:400px 400px;} }

        .portal-card { 
            background: #fff; padding: 50px; border: 12px solid #000; 
            box-shadow: 30px 30px 0 #000; transform: rotate(-3deg); 
            text-align: center; cursor: pointer; transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .portal-card:active { transform: rotate(0deg) scale(0.9); }
        .portal-card h1 { font-family: 'Bebas Neue'; font-size: 5rem; color: #000; line-height: 0.8; }
        .melt-exit { clip-path: circle(0% at 50% 50%) !important; pointer-events: none; }

        /* --- 2. THE CONTINUOUS COLOR-FLOW ENVIRONMENT --- */
        .chameleon-bg { 
            position: fixed; inset: 0; z-index: -2; 
            /* Deep HSL values (5% lightness) keep it dark but colorful */
            background: linear-gradient(125deg, hsl(0, 40%, 5%), hsl(120, 40%, 5%), hsl(240, 40%, 5%));
            background-size: 400% 400%;
            animation: darkFlow 25s linear infinite; 
        }

        @keyframes darkFlow {
            0% { background-position: 0% 50%; filter: hue-rotate(0deg); }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; filter: hue-rotate(360deg); }
        }
        
        .vignette { 
            position: fixed; inset: 0; z-index: -1; 
            background: radial-gradient(circle at center, transparent 0%, rgba(0,0,0,0.5) 60%, rgba(0,0,0,1) 100%); 
            pointer-events: none; 
        }

        .reactive-orb { 
            position: absolute; width: 120vw; height: 120vh; 
            background: radial-gradient(circle, var(--accent), transparent 70%); 
            border-radius: 50%; filter: blur(120px); opacity: 0.15; 
            transform: translate(-50%, -50%); transition: 0.1s linear; pointer-events: none;
        }

        /* --- 3. LIQUID-METAL SHAPESHIFTING HEADER --- */
        header { padding: 70px 30px 30px; }
        #header-text {
            font-size: clamp(3rem, 12vw, 5rem); line-height: 0.8;
            background: linear-gradient(180deg, #fff 0%, rgba(255,255,255,0.1) 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            transition: all 3s cubic-bezier(0.4, 0, 0.2, 1);
            will-change: font-variation-settings, font-weight, letter-spacing;
        }

        /* --- 4. OBSIDIAN TRACK CARDS --- */
        .scroll-list { flex: 1; overflow-y: auto; padding: 0 20px 280px; scrollbar-width: none; perspective: 1000px; }
        .scroll-list::-webkit-scrollbar { display: none; }

        .track-item { position: relative; margin-bottom: 18px; opacity: 0; transform: translateY(40px); }
        .queue-hint { position: absolute; left: 30px; top: 50%; transform: translateY(-50%); color: var(--accent); font-weight: 900; font-size: 0.7rem; letter-spacing: 2px; opacity: 0; }
        
        .track-card {
            background: var(--glass); border: 1px solid var(--border); border-radius: 35px;
            padding: 28px; backdrop-filter: blur(50px); display: flex; align-items: center; gap: 20px;
            transition: transform 0.1s linear, background 0.4s, box-shadow 0.4s; position: relative; z-index: 2;
        }
        .track-card::after { 
            content: ''; position: absolute; inset: 0; 
            background: linear-gradient(115deg, transparent 40%, rgba(255,255,255,0.1) 50%, transparent 60%); 
            transform: translateX(-100%); transition: 0.8s; 
        }
        .track-card:hover::after { transform: translateX(100%); }
        .track-card.active { background: #fff; color: #000; box-shadow: 0 20px 60px rgba(0,242,255,0.2); }

        /* --- 5. GHOST DOCK --- */
        .dock {
            position: fixed; bottom: 30px; left: 20px; right: 20px; 
            background: rgba(10,10,10,0.75); backdrop-filter: blur(60px);
            border: 1px solid var(--border); border-radius: 50px; padding: 30px;
            transform: translateY(160%); transition: 1s cubic-bezier(0.19, 1, 0.22, 1); z-index: 1000;
        }
        .dock.visible { transform: translateY(0); }
        .rail { width: 100%; height: 6px; background: rgba(255,255,255,0.1); border-radius: 10px; margin-bottom: 25px; cursor: pointer; }
        .fill { height: 100%; width: 0%; background: #fff; border-radius: 10px; box-shadow: 0 0 30px #fff; }

        .play-trigger { 
            width: 70px; height: 70px; background: #fff; color: #000; border-radius: 50%; 
            display: flex; align-items: center; justify-content: center; font-size: 1.5rem; 
            cursor: pointer; transition: 0.3s; 
        }

        .container { display: flex; flex-direction: column; height: 100vh; opacity: 0; transition: 2s; }
        #toast { 
            position: fixed; top: 40px; left: 50%; transform: translateX(-50%) translateY(-120px); 
            background: #fff; color: #000; padding: 14px 35px; border-radius: 50px; 
            font-weight: 900; font-size: 0.75rem; z-index: 11000; transition: 0.6s cubic-bezier(0.23, 1, 0.32, 1); 
        }
        #toast.show { transform: translateX(-50%) translateY(0); }
    </style>
</head>
<body onmousemove="handleGlobal(event)" ontouchmove="handleGlobal(event)">

    <div id="toast">QUEUED</div>

    <div id="portal" onclick="ignite()">
        <div class="portal-card">
            <h1>VEDANT</h1>
            <p style="color:#000; font-weight:900; letter-spacing:6px; font-size:0.7rem; margin-top:10px;">ENTER THE IMAGINATION</p>
        </div>
    </div>

    <div class="chameleon-bg"></div>
    <div class="vignette"></div>
    <div class="reactive-orb" id="orb"></div>

    <div class="container" id="app">
        <header>
            <p style="font-size: 0.6rem; letter-spacing: 10px; opacity: 0.5; margin-bottom: 15px; font-weight:800;">ENDLESS CHOICES v1.4.2.8</p>
            <div id="header-text">VEDANT'S<br>PLAYLIST</div>
        </header>

        <div class="scroll-list" id="list"></div>

        <div class="dock" id="dock">
            <div class="rail" onclick="seek(event)"><div class="fill" id="fill"></div></div>
            <div style="display:flex; align-items:center; justify-content:space-between;">
                <div style="flex:1; overflow:hidden; margin-right:20px;">
                    <p id="track-name" style="font-weight:900; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; font-size:1.3rem; letter-spacing:-1px;">INITIALIZING...</p>
                    <p id="track-time" style="font-size:0.75rem; opacity:0.4; font-weight:800; margin-top:6px;">0:00 / 0:00</p>
                </div>
                <div style="display:flex; gap:35px; align-items:center;">
                    <div onclick="prev()" style="font-size:1.8rem; cursor:pointer; opacity:0.7;">⏮</div>
                    <div onclick="toggle()" id="play-btn" class="play-trigger">▶</div>
                    <div onclick="next()" style="font-size:1.8rem; cursor:pointer; opacity:0.7;">⏭</div>
                </div>
            </div>
        </div>
    </div>

    <audio id="player" crossorigin="anonymous"></audio>

    <script>
        const audio = document.getElementById('player');
        let songs = [], currentIdx = -1, queue = [], analyzer, dataArray;
        let startX = 0, currentX = 0;

        const fontStates = [
            { family: "'Playfair Display'", weight: "900", spacing: "-4px", style: "italic" },
            { family: "'Inter'", weight: "100", spacing: "14px", style: "normal" },
            { family: "'Fraunces'", weight: "900", spacing: "-1px", settings: "'SOFT' 100, 'WONK' 1" },
            { family: "'Inter'", weight: "900", spacing: "-2px", style: "normal" }
        ];
        let stateIdx = 0;
        function morph() {
            const h = document.getElementById('header-text');
            const s = fontStates[stateIdx % fontStates.length];
            h.style.fontFamily = s.family;
            h.style.fontWeight = s.weight;
            h.style.letterSpacing = s.spacing;
            h.style.fontStyle = s.style || "normal";
            if(s.settings) h.style.fontVariationSettings = s.settings;
            stateIdx++;
        }
        setInterval(morph, 5000);

        function handleGlobal(e) {
            const orb = document.getElementById('orb');
            const x = e.clientX || (e.touches ? e.touches[0].clientX : 0);
            const y = e.clientY || (e.touches ? e.touches[0].clientY : 0);
            orb.style.left = x + 'px';
            orb.style.top = y + 'px';

            if (y > window.innerHeight * 0.8) document.getElementById('dock').classList.add('visible');
            else if (!audio.paused) {
                clearTimeout(window.dockHide);
                window.dockHide = setTimeout(() => {
                    if(y < window.innerHeight * 0.7) document.getElementById('dock').classList.remove('visible');
                }, 4000);
            }
        }

        function initAudioEngine() {
            const ctx = new (window.AudioContext || window.webkitAudioContext)();
            const src = ctx.createMediaElementSource(audio);
            analyzer = ctx.createAnalyser();
            src.connect(analyzer); analyzer.connect(ctx.destination);
            analyzer.fftSize = 64;
            dataArray = new Uint8Array(analyzer.frequencyBinCount);
            tick();
        }

        function tick() {
            requestAnimationFrame(tick);
            if (!analyzer) return;
            analyzer.getByteFrequencyData(dataArray);
            const bass = dataArray[2] / 255;
            document.getElementById('orb').style.transform = `translate(-50%, -50%) scale(${1 + bass * 1.5})`;
            document.getElementById('orb').style.opacity = 0.1 + (bass * 0.4);
            
            // Subtle brightness lift on bass hits for the background
            document.querySelector('.chameleon-bg').style.filter = `brightness(${1 + bass * 0.4})`;
        }

        function ignite() {
            document.getElementById('portal').classList.add('melt-exit');
            document.getElementById('app').style.opacity = "1";
            initAudioEngine();
            morph();
            loadSongs();
        }

        async function loadSongs() {
            const res = await fetch(`https://api.github.com/repos/forpc1428-eng/SONGS/contents/`);
            const data = await res.json();
            songs = data.filter(f => f.name.endsWith('.mp3')).map(f => ({
                name: f.name.replace('.mp3', '').replace(/_/g, ' '),
                url: `https://media.githubusercontent.com/media/forpc1428-eng/SONGS/main/${encodeURIComponent(f.name)}`
            }));
            renderList();
        }

        function renderList() {
            const list = document.getElementById('list');
            list.innerHTML = songs.map((s, i) => `
                <div class="track-item" style="transition-delay: ${i * 0.05}s; opacity: 1; transform: translateY(0)">
                    <div class="queue-hint" id="hint-${i}">ADD NEXT</div>
                    <div class="track-card ${i === currentIdx ? 'active' : ''}" id="card-${i}" 
                         onclick="playSong(${i})" ontouchstart="ts(event,${i})" ontouchmove="tm(event,${i})" ontouchend="te(event,${i})">
                        <p style="font-weight:200; opacity:0.3; font-size:0.8rem;">${(i+1).toString().padStart(2,'0')}</p>
                        <p style="font-weight:900; flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;">${s.name}</p>
                    </div>
                </div>
            `).join('');
        }

        function ts(e, i) { startX = e.touches[0].clientX; }
        function tm(e, i) { 
            currentX = e.touches[0].clientX - startX; 
            if(currentX > 0 && currentX < 140) {
                document.getElementById(`card-${i}`).style.transform = `translateX(${currentX}px)`;
                document.getElementById(`hint-${i}`).style.opacity = currentX / 100;
            }
        }
        function te(e, i) {
            const card = document.getElementById(`card-${i}`);
            if(currentX > 90) {
                queue.push(songs[i]);
                const t = document.getElementById('toast');
                t.innerText = "NEXT UP: " + songs[i].name;
                t.classList.add('show');
                setTimeout(()=>t.classList.remove('show'), 2500);
            }
            card.style.transition = "transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275)";
            card.style.transform = `translateX(0)`;
            document.getElementById(`hint-${i}`).style.opacity = 0;
            setTimeout(() => card.style.transition = "transform 0.1s linear", 500);
            currentX = 0;
        }

        function playSong(i) {
            currentIdx = i;
            audio.src = songs[i].url;
            audio.play();
            document.getElementById('track-name').innerText = songs[i].name;
            document.getElementById('play-btn').innerText = "⏸";
            document.getElementById('dock').classList.add('visible');
            renderList();
        }

        function toggle() { 
            if(audio.paused) { audio.play(); document.getElementById('play-btn').innerText = "⏸"; }
            else { audio.pause(); document.getElementById('play-btn').innerText = "▶"; }
        }

        function next() {
            if(queue.length > 0) {
                const s = queue.shift();
                currentIdx = songs.findIndex(x => x.url === s.url);
                playSong(currentIdx);
            } else if(currentIdx < songs.length - 1) playSong(currentIdx + 1);
        }
        function prev() { if(currentIdx > 0) playSong(currentIdx - 1); }
        
        function seek(e) { 
            const rect = document.querySelector('.rail').getBoundingClientRect();
            audio.currentTime = ((e.clientX - rect.left) / rect.width) * audio.duration; 
        }

        audio.ontimeupdate = () => {
            const p = (audio.currentTime / audio.duration) * 100;
            document.getElementById('fill').style.width = p + "%";
            document.getElementById('track-time').innerText = `${fmt(audio.currentTime)} / ${fmt(audio.duration || 0)}`;
        };
        const fmt = (s) => `${Math.floor(s/60)}:${Math.floor(s%60).toString().padStart(2,'0')}`;
        audio.onended = () => next();
    </script>
</body>
</html>
