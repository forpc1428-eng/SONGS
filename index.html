<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>VEDANT'S PLAYLIST</title>
  <link rel="manifest" href="manifest.json">
  
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#000000">

  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Montserrat:wght@600&display=swap" rel="stylesheet">

  <style>
    :root { --accent: #00f2ff; --glass-bg: rgba(20, 20, 20, 0.7); --glass-border: rgba(255, 255, 255, 0.1); }
    body { margin: 0; background: #000; color: #fff; font-family: 'Montserrat', sans-serif; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
    
    #portal { position: fixed; inset: 0; z-index: 10000; background: #fff; background-image: url('https://ik.imagekit.io/22h7wv5o2/doodle.jpg?updatedAt=1773773281436'); background-size: 500px; display: flex; align-items: center; justify-content: center; transition: clip-path 2.2s cubic-bezier(0.8, 0, 0.2, 1); clip-path: circle(150% at 50% 50%); animation: doodleScroll 80s linear infinite; }
    @keyframes doodleScroll { from {background-position:0 0;} to {background-position:400px 400px;} }
    .portal-card { background: #fff; padding: 50px; border: 12px solid #000; box-shadow: 10px 10px 0 #000; transform: rotate(-3deg); text-align: center; cursor: pointer; transition: 0.4s; }
    .portal-card h1 { font-family: 'Bebas Neue'; font-size: clamp(2rem, 12vw, 5rem); color: #000; margin:0; }
    .melt-exit { clip-path: circle(0% at 50% 50%) !important; pointer-events: none; }

    #home-header { font-family: 'Playfair Display'; font-size: 2.5rem; text-align: center; margin: 40px 0 20px; }
    .list { flex: 1; overflow-y: auto; padding: 20px; margin-bottom: 160px; scrollbar-width: none; }
    .list::-webkit-scrollbar { display: none; }
    .track { background: rgba(255,255,255,0.03); border: 1px solid var(--glass-border); border-radius: 20px; padding: 20px; margin-bottom: 16px; cursor: pointer; transition: 0.4s; }
    .track.playing { transform: scale(1.04); background: linear-gradient(135deg, rgba(0,242,255,0.1), rgba(255,255,255,0.02)); border-color: var(--accent); color: var(--accent); font-weight: 800; box-shadow: 0 10px 30px rgba(0, 242, 255, 0.15); }

    .bar { position: fixed; bottom: 20px; left: 15px; right: 15px; background: var(--glass-bg); backdrop-filter: blur(30px); -webkit-backdrop-filter: blur(30px); border: 1px solid var(--glass-border); border-radius: 28px; padding: 18px; z-index: 9999; box-shadow: 0 25px 50px rgba(0,0,0,0.6); }
    #time { font-size: 0.7rem; font-weight: 900; opacity: 0.5; margin-bottom: 12px; text-align: center; }
    .progress { height: 4px; background: rgba(255,255,255,0.1); border-radius: 10px; cursor: pointer; }
    .fill { height: 100%; width: 0%; background: #fff; border-radius: 10px; box-shadow: 0 0 15px #fff; transition: width 0.1s linear; }
    .controls { display: flex; justify-content: space-around; align-items: center; margin-top: 15px; }
    .btn { cursor: pointer; font-size: 1.7rem; transition: 0.3s; color: rgba(255,255,255,0.7); }
    #play-trigger { font-size: 2.3rem; color: #fff; }
    .shuffle.active { color: var(--accent); text-shadow: 0 0 10px var(--accent); }
  </style>
</head>
<body>

  <div id="portal" onclick="startApp()">
    <div class="portal-card">
      <h1>VEDANT</h1>
      <p style="color:#000; font-weight:900; letter-spacing:6px; font-size:0.7rem; margin-top:10px;">ENTER THE IMAGINATION</p>
    </div>
  </div>

  <header id="home-header">ENDLESS CHOICES</header>
  <div class="list" id="list"></div>

  <div class="bar">
    <div id="time">0:00 / 0:00</div>
    <div class="progress" onclick="seek(event)"><div class="fill" id="fill"></div></div>
    <div class="controls">
      <div class="btn" onclick="prev()">⏮</div>
      <div class="btn" id="play-trigger" onclick="toggle()">▶</div>
      <div class="btn" onclick="next()">⏭</div>
      <div class="btn shuffle" id="shuffle" onclick="toggleShuffle()">🔀</div>
    </div>
  </div>

  <audio id="player" crossorigin="anonymous"></audio>

  <script>
    const audio = document.getElementById('player');
    const playBtn = document.getElementById('play-trigger');
    let songs = [], currentIdx = -1, shuffleOn = false;
    const ARTWORK = "https://raw.githubusercontent.com/forpc1428-eng/SONGS/theme_artwork.jpg";

    async function startApp() {
      document.getElementById('portal').classList.add('melt-exit');
      const res = await fetch(`https://api.github.com/repos/forpc1428-eng/SONGS/contents/`);
      const data = await res.json();
      songs = data.filter(f => f.name.endsWith('.mp3')).map(f => ({
        name: f.name.replace('.mp3','').replace(/_/g,' '),
        url: `https://media.githubusercontent.com/media/forpc1428-eng/SONGS/main/${encodeURIComponent(f.name)}`
      }));
      renderList();
    }

    function renderList() {
      const list = document.getElementById('list');
      list.innerHTML = songs.map((s,i)=>`
        <div class="track ${i === currentIdx ? 'playing' : ''}" onclick="playSong(${i})">
          ${s.name}
        </div>
      `).join('');
    }

    function playSong(i) {
      currentIdx = i;
      audio.src = songs[i].url;
      audio.play();
      playBtn.innerText = "⏸";
      updateMediaSession();
      renderList();
    }

    function toggle() {
      if(audio.paused){ audio.play(); playBtn.innerText="⏸"; }
      else { audio.pause(); playBtn.innerText="▶"; }
    }

    function next() {
      if(shuffleOn) {
        let idx; do { idx = Math.floor(Math.random()*songs.length); } while(idx===currentIdx);
        playSong(idx);
      } else if(currentIdx < songs.length-1) playSong(currentIdx+1);
    }

    function prev(){ if(currentIdx>0) playSong(currentIdx-1); }

    function seek(e){
      const rect = e.currentTarget.getBoundingClientRect();
      audio.currentTime = ((e.clientX - rect.left) / rect.width) * audio.duration;
    }

    function toggleShuffle(){
      shuffleOn = !shuffleOn;
      document.getElementById('shuffle').classList.toggle('active', shuffleOn);
    }

    audio.ontimeupdate = () => {
      const p = (audio.currentTime/audio.duration)*100;
      document.getElementById('fill').style.width = p+"%";
      document.getElementById('time').innerText = `${fmt(audio.currentTime)} / ${fmt(audio.duration||0)}`;
    };

    const fmt = s => `${Math.floor(s/60)}:${Math.floor(s%60).toString().padStart(2,'0')}`;

    function updateMediaSession() {
      if ('mediaSession' in navigator && songs[currentIdx]) {
        navigator.mediaSession.metadata = new MediaMetadata({
          title: songs[currentIdx].name,
          artist: "Vedant",
          artwork: [{ src: ARTWORK, sizes: '512x512', type: 'image/jpeg' }]
        });
        navigator.mediaSession.setActionHandler('play', () => toggle());
        navigator.mediaSession.setActionHandler('pause', () => toggle());
        navigator.mediaSession.setActionHandler('previoustrack', () => prev());
        navigator.mediaSession.setActionHandler('nexttrack', () => next());
      }
    }

    // SERVICE WORKER REGISTRATION (Allows Home Screen Install)
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js').catch(err => console.log('SW failed', err));
      });
    }
  </script>
</body>
</html>
