<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Simple Music App</title>

<style>
body{
  background:#000;
  color:#fff;
  font-family:Arial;
  margin:0;
  padding:20px;
}

h1{
  text-align:center;
}

#songs{
  margin-top:20px;
}

.song{
  padding:12px;
  border-bottom:1px solid #222;
  cursor:pointer;
}

.song:hover{
  background:#111;
}

.player{
  position:fixed;
  bottom:0;
  left:0;
  width:100%;
  background:#111;
  padding:15px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

button{
  padding:10px 15px;
  margin:5px;
  background:#222;
  color:#fff;
  border:none;
  cursor:pointer;
}

button:hover{
  background:#333;
}
</style>
</head>

<body>

<h1>My Music</h1>

<div id="songs"></div>

<div class="player">
  <div id="now">Nothing Playing</div>
  <div>
    <button onclick="prev()">Prev</button>
    <button onclick="toggle()">Play/Pause</button>
    <button onclick="next()">Next</button>
  </div>
</div>

<script>
const API = "https://script.google.com/macros/s/AKfycbwwYEAgMQTV5yulcPTnFwt2-lVzJOXxJU88G5x3ZcmaTzfi4uOzl81kcAlzqj_yhObg/exec";

let songs = [];
let currentIndex = 0;

let audio = new Audio();
audio.preload = "auto";

// 🔥 Fix Drive links
function getPlayableUrl(url){
  let id = url.match(/[-\\w]{25,}/);
  if(id){
    return "https://docs.google.com/uc?export=download&id=" + id[0];
  }
  return url;
}

// Load songs
async function load(){
  let res = await fetch(API);
  let data = await res.json();

  songs = data.map(s => ({
    title: s.name.replace(".mp3","").replaceAll("_"," "),
    url: getPlayableUrl(s.link)
  }));

  render();
}

// Render list
function render(){
  let container = document.getElementById("songs");
  container.innerHTML = "";

  songs.forEach((s, i)=>{
    let div = document.createElement("div");
    div.className = "song";
    div.innerText = s.title;
    div.onclick = ()=> play(i);
    container.appendChild(div);
  });
}

// Play
async function play(i){
  try{
    currentIndex = i;
    let s = songs[i];

    audio.pause();
    audio.src = s.url;
    audio.load();

    await audio.play();

    document.getElementById("now").innerText = s.title;

  }catch(e){
    alert("Playback failed");
  }
}

// Controls
function toggle(){
  if(audio.paused){
    audio.play();
  }else{
    audio.pause();
  }
}

function next(){
  if(currentIndex < songs.length - 1){
    play(currentIndex + 1);
  }
}

function prev(){
  if(currentIndex > 0){
    play(currentIndex - 1);
  }
}

// Auto next
audio.addEventListener("ended", ()=>{
  next();
});

// Start
load();
</script>

</body>
</html>
