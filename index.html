<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vedant Music</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#000;
  color:#fff;
}

h1{
  text-align:center;
  padding:20px;
}

#songs{
  padding-bottom:100px;
}

.song{
  padding:15px;
  border-bottom:1px solid #222;
  cursor:pointer;
}

.song:hover{
  background:#111;
}

.player{
  position:fixed;
  bottom:0;
  left:0;
  width:100%;
  background:#111;
  padding:15px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.controls button{
  margin:5px;
  padding:10px 15px;
  border:none;
  background:#222;
  color:#fff;
  cursor:pointer;
}

.controls button:hover{
  background:#333;
}
</style>
</head>

<body>

<h1>🎧 Vedant Music</h1>

<div id="songs"></div>

<div class="player">
  <div id="now">Nothing Playing</div>
  <div class="controls">
    <button onclick="prev()">⏮</button>
    <button onclick="toggle()">⏯</button>
    <button onclick="next()">⏭</button>
  </div>
</div>

<script>
const API = "https://script.google.com/macros/s/AKfycbxjKDwiQuQ8qPyfVjCo4c6pQSMDAVHCC3fpaUieJMe8-Vcoiq6r8dgjAjl0iZ6TDyr4/exec";

let songs = [];
let currentIndex = 0;

const audio = new Audio();
audio.preload = "auto";
audio.crossOrigin = "anonymous";
audio.playsInline = true;

// LOAD SONGS
async function load(){
  try{
    const res = await fetch(API);
    const data = await res.json();

    songs = data.map(s => ({
      title: s.name.replace(".mp3","").replace(".wav","").replaceAll("_"," "),
      url: s.link
    }));

    render();
  }catch(e){
    console.error(e);
    alert("Failed to load songs");
  }
}

// RENDER LIST
function render(){
  const container = document.getElementById("songs");
  container.innerHTML = "";

  songs.forEach((s, i)=>{
    const div = document.createElement("div");
    div.className = "song";
    div.innerText = s.title;
    div.onclick = ()=> play(i);
    container.appendChild(div);
  });
}

// PLAY FUNCTION
async function play(i){
  try{
    currentIndex = i;
    const s = songs[i];

    audio.pause();
    audio.src = s.link;
    audio.load();

    await audio.play();

    document.getElementById("now").innerText = s.title;

  }catch(err){
    console.error(err);
    alert("Playback failed (Drive issue)");
  }
}

// CONTROLS
function toggle(){
  if(audio.paused){
    audio.play();
  }else{
    audio.pause();
  }
}

function next(){
  if(currentIndex < songs.length - 1){
    play(currentIndex + 1);
  }
}

function prev(){
  if(currentIndex > 0){
    play(currentIndex - 1);
  }
}

// AUTO NEXT
audio.addEventListener("ended", ()=>{
  next();
});

// BUFFER STATUS (optional but helpful)
audio.addEventListener("waiting", ()=>{
  document.getElementById("now").innerText = "Buffering...";
});

audio.addEventListener("playing", ()=>{
  if(songs[currentIndex]){
    document.getElementById("now").innerText = songs[currentIndex].title;
  }
});

// INIT
load();
</script>

</body>
</html>
