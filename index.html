<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>VEDANT'S PLAYLIST</title>
  <link href="https://fonts.googleapis.com/css2?family=Big+Shoulders+Display:wght@700&display=swap&family=Bebas+Neue&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0; background: #000; color: #fff;
      font-family: 'Big Shoulders Display', sans-serif;
      display: flex; flex-direction: column; height: 100vh;
    }

    /* --- Landing Page (unchanged) --- */
    #portal {
      position: fixed; inset: 0; z-index: 10000; background: #fff;
      background-image: url('https://ik.imagekit.io/22h7wv5o2/doodle.jpg?updatedAt=1773773281436');
      background-size: 500px;
      display: flex; align-items: center; justify-content: center;
      transition: clip-path 2.2s cubic-bezier(0.8, 0, 0.2, 1); 
      clip-path: circle(150% at 50% 50%);
      animation: doodleScroll 80s linear infinite;
    }
    @keyframes doodleScroll { from {background-position:0 0;} to {background-position:400px 400px;} }

    .portal-card { 
      background: #fff; padding: 50px; border: 12px solid #000; 
      box-shadow: 30px 30px 0 #000; transform: rotate(-3deg); 
      text-align: center; cursor: pointer; transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }
    .portal-card:active { transform: rotate(0deg) scale(0.9); }
    .portal-card h1 { font-family: 'Bebas Neue'; font-size: 5rem; color: #000; line-height: 0.8; }
    .melt-exit { clip-path: circle(0% at 50% 50%) !important; pointer-events: none; }

    /* --- Home Page --- */
    .list { flex: 1; overflow-y: auto; padding: 20px; }
    .track {
      background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
      border-radius: 20px; padding: 15px; margin-bottom: 15px;
      backdrop-filter: blur(20px); box-shadow: 0 10px 20px rgba(0,0,0,0.5);
      cursor: pointer; transition: transform 0.2s ease;
    }
    .track:active { transform: scale(0.97); }

    .bar {
      background: rgba(255,255,255,0.05); backdrop-filter: blur(30px);
      border-top: 1px solid rgba(255,255,255,0.1); padding: 15px;
      display: flex; flex-direction: column;
    }
    .progress { height: 6px; background: rgba(255,255,255,0.2); border-radius: 10px; cursor: pointer; }
    .fill { height: 100%; width: 0%; background: #fff; border-radius: 10px; }
    .controls { display: flex; justify-content: space-around; margin-top: 10px; }
    .btn { cursor: pointer; font-size: 1.5rem; }
    .shuffle.active { color: #00f2ff; }
  </style>
</head>
<body>
  <!-- Landing -->
  <div id="portal" onclick="startApp()">
    <div class="portal-card">
      <h1>VEDANT</h1>
      <p style="color:#000; font-weight:900; letter-spacing:6px; font-size:0.7rem; margin-top:10px;">ENTER THE IMAGINATION</p>
    </div>
  </div>

  <!-- Song List -->
  <div class="list" id="list"></div>

  <!-- Song Bar -->
  <div class="bar">
    <div id="time">0:00 / 0:00</div>
    <div class="progress" onclick="seek(event)">
      <div class="fill" id="fill"></div>
    </div>
    <div class="controls">
      <div class="btn" onclick="prev()">⏮</div>
      <div class="btn" onclick="toggle()">▶</div>
      <div class="btn" onclick="next()">⏭</div>
      <div class="btn shuffle" id="shuffle" onclick="toggleShuffle()">🔀</div>
    </div>
  </div>

  <script>
    let songs = [], currentIdx = -1, shuffleOn = false;
    let audioCtx, gainNode, currentAudio, nextAudio;

    async function startApp() {
      document.getElementById('portal').classList.add('melt-exit');
      const res = await fetch(`https://api.github.com/repos/forpc1428-eng/SONGS/contents/`);
      const data = await res.json();
      songs = data.filter(f => f.name.endsWith('.mp3')).map(f => ({
        name: f.name.replace('.mp3','').replace(/_/g,' '),
        url: `https://media.githubusercontent.com/media/forpc1428-eng/SONGS/main/${encodeURIComponent(f.name)}`
      }));
      renderList();
      initAudio();
    }

    function renderList() {
      const list = document.getElementById('list');
      list.innerHTML = songs.map((s,i)=>`
        <div class="track" onclick="playSong(${i})">${s.name}</div>
      `).join('');
    }

    function initAudio() {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      gainNode = audioCtx.createGain();
      gainNode.connect(audioCtx.destination);
    }

    function playSong(i) {
      if(currentAudio) currentAudio.pause();
      currentIdx = i;
      currentAudio = new Audio(songs[i].url);
      const src = audioCtx.createMediaElementSource(currentAudio);
      src.connect(gainNode);
      currentAudio.play();
      document.querySelector('.controls .btn:nth-child(2)').innerText = "⏸";
      preloadNext();
      currentAudio.ontimeupdate = updateProgress;
      currentAudio.onended = () => next();
    }

    function preloadNext() {
      let nextIdx;
      if(shuffleOn) {
        do { nextIdx = Math.floor(Math.random()*songs.length); } while(nextIdx===currentIdx);
      } else {
        nextIdx = (currentIdx+1) % songs.length;
      }
      nextAudio = new Audio(songs[nextIdx].url);
      nextAudio.preload = "auto";
    }

    function crossfadeToNext() {
      if(!nextAudio) return;
      const src = audioCtx.createMediaElementSource(nextAudio);
      const nextGain = audioCtx.createGain();
      src.connect(nextGain); nextGain.connect(audioCtx.destination);

      nextAudio.play();
      gainNode.gain.linearRampToValueAtTime(0, audioCtx.currentTime+1);
      nextGain.gain.linearRampToValueAtTime(1, audioCtx.currentTime+1);

      currentAudio = nextAudio;
      preloadNext();
    }

    function toggle() {
      if(currentAudio.paused){ currentAudio.play(); document.querySelector('.controls .btn:nth-child(2)').innerText="⏸"; }
      else { currentAudio.pause(); document.querySelector('.controls .btn:nth-child(2)').innerText="▶"; }
    }

    function next() { crossfadeToNext(); }
    function prev(){ if(currentIdx>0) playSong(currentIdx-1); }

    function seek(e){
      const rect = e.target.getBoundingClientRect();
      currentAudio.currentTime = ((e.clientX-rect.left)/rect.width)*currentAudio.duration;
    }

    function toggleShuffle(){
      shuffleOn = !shuffleOn;
      document.getElementById('shuffle').classList.toggle('active', shuffleOn);
    }

    function updateProgress() {
      const p = (currentAudio.currentTime/currentAudio.duration)*100;
      document.getElementById('fill').style.width = p+"%";
      document.getElementById('time').innerText = `${fmt(currentAudio.currentTime)} / ${fmt(currentAudio.duration||0)}`;
    }

    const fmt = s => `${Math.floor(s/60)}:${Math.floor(s%60).toString().padStart(2,'0')}`;
  </script>
</body>
</html>
