<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>VEDANT'S PLAYLIST</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Bebas Neue for landing -->
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap" rel="stylesheet">
  <!-- Premium fonts for home header -->
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Montserrat:wght@600&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0; background: #000; color: #fff;
      font-family: 'Montserrat', sans-serif;
      display: flex; flex-direction: column; height: 100vh;
      max-width: 100%; overflow-x: hidden;
    }

    /* --- Landing Page (unchanged) --- */
    #portal {
      position: fixed; inset: 0; z-index: 10000; background: #fff;
      background-image: url('https://ik.imagekit.io/22h7wv5o2/doodle.jpg?updatedAt=1773773281436');
      background-size: 500px;
      display: flex; align-items: center; justify-content: center;
      transition: clip-path 2.2s cubic-bezier(0.8, 0, 0.2, 1); 
      clip-path: circle(150% at 50% 50%);
      animation: doodleScroll 80s linear infinite;
    }
    @keyframes doodleScroll { from {background-position:0 0;} to {background-position:400px 400px;} }

    .portal-card { 
      background: #fff; padding: 50px; border: 12px solid #000; 
      box-shadow: 10px 10px 0 #000; transform: rotate(-3deg); 
      text-align: center; cursor: pointer; transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }
    .portal-card:active { transform: rotate(0deg) scale(0.9); }
    .portal-card h1 { font-family: 'Bebas Neue', sans-serif; font-size: clamp(2rem, 12vw, 5rem); color: #000; line-height: 0.8; }
    .melt-exit { clip-path: circle(0% at 50% 50%) !important; pointer-events: none; }

    /* --- Home Page --- */
    #home-header {
      font-family: 'Playfair Display', 'Montserrat', sans-serif;
      font-size: clamp(2rem, 8vw, 4rem);
      font-weight: 700;
      color: #fff;
      text-align: center;
      margin: 20px 0;
    }

    .list { flex: 1; overflow-y: auto; padding: 20px; }
    .track {
      background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.15);
      border-radius: 16px; padding: 12px; margin-bottom: 12px;
      cursor: pointer; transition: transform 0.2s ease;
    }
    .track:active { transform: scale(0.97); }

    .bar {
      background: rgba(255,255,255,0.08);
      border-top: 1px solid rgba(255,255,255,0.15); padding: 12px;
      display: flex; flex-direction: column;
    }
    .progress { height: 6px; background: rgba(255,255,255,0.2); border-radius: 10px; cursor: pointer; }
    .fill { height: 100%; width: 0%; background: #fff; border-radius: 10px; }
    .controls { display: flex; justify-content: space-around; margin-top: 10px; }
    .btn { cursor: pointer; font-size: 1.5rem; }
    .shuffle.active { color: #00f2ff; }
  </style>
</head>
<body>
  <!-- Landing -->
  <div id="portal" onclick="startApp()">
    <div class="portal-card">
      <h1>VEDANT</h1>
      <p style="color:#000; font-weight:900; letter-spacing:6px; font-size:0.7rem; margin-top:10px;">ENTER THE IMAGINATION</p>
    </div>
  </div>

  <!-- Home Header -->
  <header id="home-header">VEDANT'S PLAYLIST</header>

  <!-- Song List -->
  <div class="list" id="list"></div>

  <!-- Song Bar -->
  <div class="bar">
    <div id="time">0:00 / 0:00</div>
    <div class="progress" onclick="seek(event)">
      <div class="fill" id="fill"></div>
    </div>
    <div class="controls">
      <div class="btn" onclick="prev()">⏮</div>
      <div class="btn" onclick="toggle()">▶</div>
      <div class="btn" onclick="next()">⏭</div>
      <div class="btn shuffle" id="shuffle" onclick="toggleShuffle()">🔀</div>
    </div>
  </div>

  <!-- Single audio element -->
  <audio id="player" preload="auto"></audio>

  <script>
    const audio = document.getElementById('player');
    let songs = [], currentIdx = -1, shuffleOn = false;

    async function startApp() {
      document.getElementById('portal').classList.add('melt-exit');
      const res = await fetch(`https://api.github.com/repos/forpc1428-eng/SONGS/contents/`);
      const data = await res.json();
      songs = data.filter(f => f.name.endsWith('.mp3')).map(f => ({
        name: f.name.replace('.mp3','').replace(/_/g,' '),
        url: `https://media.githubusercontent.com/media/forpc1428-eng/SONGS/main/${encodeURIComponent(f.name)}`
      }));
      renderList();
    }

    function renderList() {
      const list = document.getElementById('list');
      list.innerHTML = songs.map((s,i)=>`
        <div class="track" onclick="playSong(${i})">${s.name}</div>
      `).join('');
    }

    function playSong(i) {
      currentIdx = i;
      audio.src = songs[i].url;
      audio.play();
      document.querySelector('.controls .btn:nth-child(2)').innerText = "⏸";
      updateMediaSession();
    }

    function toggle() {
      if(audio.paused){ audio.play(); document.querySelector('.controls .btn:nth-child(2)').innerText="⏸"; }
      else { audio.pause(); document.querySelector('.controls .btn:nth-child(2)').innerText="▶"; }
    }

    function next() {
      if(shuffleOn) {
        let idx; do { idx = Math.floor(Math.random()*songs.length); } while(idx===currentIdx);
        playSong(idx);
      } else if(currentIdx < songs.length-1) playSong(currentIdx+1);
    }

    function prev(){ if(currentIdx>0) playSong(currentIdx-1); }

    function seek(e){
      const rect = e.target.getBoundingClientRect();
      audio.currentTime = ((e.clientX-rect.left)/rect.width)*audio.duration;
    }

    function toggleShuffle(){
      shuffleOn = !shuffleOn;
      document.getElementById('shuffle').classList.toggle('active', shuffleOn);
    }

    audio.ontimeupdate = () => {
      const p = (audio.currentTime/audio.duration)*100;
      document.getElementById('fill').style.width = p+"%";
      document.getElementById('time').innerText = `${fmt(audio.currentTime)} / ${fmt(audio.duration||0)}`;
    };

    const fmt = s => `${Math.floor(s/60)}:${Math.floor(s%60).toString().padStart(2,'0')}`;

    // Media Session API for notification/lock screen controls
    function updateMediaSession() {
      if ('mediaSession' in navigator && songs[currentIdx]) {
        navigator.mediaSession.metadata = new MediaMetadata({
          title: songs[currentIdx].name,
          artist: "Vedant",
          artwork: [
            { src: "purple_glass.png", sizes: "512x512", type: "image/png" }
          ]
        });
        navigator.mediaSession.setActionHandler('play', () => audio.play());
        navigator.mediaSession.setActionHandler('pause', () => audio.pause());
        navigator.mediaSession.setActionHandler('previoustrack', () => prev());
        navigator.mediaSession.setActionHandler('nexttrack', () => next());
      }
    }
  </script>
</body>
</html>
