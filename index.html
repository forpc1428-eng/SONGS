<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>V-CORE INFINITY</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&family=Playfair+Display:wght@900&display=swap" rel="stylesheet">
    <style>
        :root { 
            --glass: rgba(255, 255, 255, 0.04); 
            --border: rgba(255, 255, 255, 0.08); 
            --active-glass: rgba(255, 255, 255, 0.08);
            --font: 'Plus Jakarta Sans', sans-serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: var(--font); -webkit-tap-highlight-color: transparent; }
        
        body { background: #000; color: #fff; height: 100vh; overflow: hidden; position: fixed; width: 100%; }

        /* --- THE DARK AURORA BACKGROUND --- */
        .aurora-viewport {
            position: fixed; inset: 0; z-index: -1;
            background: #000000;
            overflow: hidden;
            perspective: 1000px;
        }

        .aurora-blob {
            position: absolute;
            width: 70vw; height: 70vh;
            border-radius: 50%;
            filter: blur(100px);
            opacity: 0.35;
            animation: swirl 30s infinite alternate cubic-bezier(0.45, 0.05, 0.55, 0.95);
        }

        .blob-1 { background: #110022; top: -20%; left: -20%; animation-delay: 0s; }
        .blob-2 { background: #001122; bottom: -20%; right: -20%; animation-delay: -7s; }
        .blob-3 { background: #221100; top: 30%; left: 40%; animation-delay: -14s; }

        @keyframes swirl {
            0% { transform: translate(0,0) rotate(0deg) scale(1); }
            50% { transform: translate(15vw, 15vh) rotate(90deg) scale(1.15); }
            100% { transform: translate(-15vw, -15vh) rotate(180deg) scale(1); }
        }

        /* --- GENTLE VIGNETTE OVERLAY --- */
        .vignette {
            position: fixed; inset: 0; z-index: 0;
            background: radial-gradient(circle at center, transparent 30%, rgba(0,0,0,0.85) 100%);
            pointer-events: none;
        }

        /* --- THE UI --- */
        .container { 
            display: flex; flex-direction: column; height: 100vh; 
            padding-top: env(safe-area-inset-top); position: relative; z-index: 10;
        }

        header { padding: 50px 25px 15px; }
        header h1 { 
            font-family: 'Playfair Display'; font-size: 3.5rem; letter-spacing: -2px; 
            background: linear-gradient(135deg, #fff 0%, #aaa 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        .search-area { padding: 0 25px 25px; }
        .search-box { 
            width: 100%; padding: 18px 25px; 
            background: var(--glass); border: 1px solid var(--border); 
            border-radius: 24px; color: #fff; backdrop-filter: blur(20px);
            outline: none; transition: 0.3s;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        .search-box:focus { border-color: #fff; background: var(--active-glass); }

        /* --- THE LIST (OPTIMIZED) --- */
        .list { 
            flex: 1; overflow-y: auto; padding: 0 25px 240px; scrollbar-width: none;
            mask-image: linear-gradient(to bottom, transparent, black 8%, black 92%, transparent);
            will-change: transform;
        }
        .list::-webkit-scrollbar { display: none; }
        
        .track { 
            display: flex; align-items: center; padding: 20px 25px; 
            background: var(--glass); border-radius: 28px; 
            margin-bottom: 15px; border: 1px solid var(--border); 
            transition: 0.2s transform, 0.2s background-color; backdrop-filter: blur(10px);
            cursor: pointer;
        }
        .track.active { background: #fff; color: #000; border-color: #fff; transform: scale(0.98); }
        .track-num { font-weight: 900; font-size: 0.75rem; width: 40px; opacity: 0.3; }
        .track.active .track-num { opacity: 0.7; color: #000; }
        .track-info { flex: 1; overflow: hidden; }
        .track-name { font-weight: 800; font-size: 1rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        /* --- THE ULTIMATE DOCK --- */
        .dock { 
            position: fixed; bottom: 25px; left: 25px; right: 25px; 
            background: rgba(10, 10, 10, 0.7); backdrop-filter: blur(35px); 
            border: 1px solid var(--border); border-radius: 40px;
            padding: 30px; z-index: 1000;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        /* Seek Bar & Timestamps */
        .seek-panel { margin-bottom: 25px; }
        .bar-bg { width: 100%; height: 7px; background: rgba(255,255,255,0.08); border-radius: 10px; position: relative; cursor: pointer; }
        .bar-fill { height: 100%; background: #fff; width: 0%; border-radius: 10px; position: relative; transition: width 0.1s linear; box-shadow: 0 0 20px #fff; }
        .bar-fill::after { 
            content: ''; position: absolute; right: -7px; top: -5px; 
            width: 17px; height: 17px; background: #fff; border-radius: 50%; 
            box-shadow: 0 0 15px #fff; 
        }
        
        .time-meta { display: flex; justify-content: space-between; margin-top: 10px; font-size: 0.75rem; font-weight: 700; opacity: 0.5; letter-spacing: 1px; }

        /* Controls */
        .dock-controls { display: flex; align-items: center; justify-content: space-between; gap: 20px; }
        .now-playing-meta { flex: 1; overflow: hidden; }
        #cur-title { font-weight: 800; font-size: 1.2rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        
        .c-btns { display: flex; align-items: center; gap: 25px; }
        .c-icon { cursor: pointer; opacity: 0.6; transition: 0.2s; font-size: 1.6rem; }
        .c-icon:hover { opacity: 1; }
        .play-main { 
            width: 60px; height: 60px; background: #fff; color: #000; border-radius: 50%; 
            display: flex; align-items: center; justify-content: center; font-size: 1.3rem; 
            cursor: pointer; transition: 0.2s;
        }
        .play-main:active { transform: scale(0.9); }
    </style>
</head>
<body>

    <div class="aurora-viewport">
        <div class="aurora-blob blob-1"></div>
        <div class="aurora-blob blob-2"></div>
        <div class="aurora-blob blob-3"></div>
        <div class="vignette"></div>
    </div>

    <div id="portal" onclick="ignite()" style="position:fixed; inset:0; z-index:9999; background:#000; display:flex; flex-direction:column; align-items:center; justify-content:center; transition:1s ease;">
        <h2 style="letter-spacing:20px; font-weight:900; font-size:1rem; opacity:0.6; animation: pulse 2.5s infinite;">V-CORE INFINITY</h2>
    </div>

    <div class="container">
        <header><h1>LIBRARY</h1></header>
        <div class="search-area">
            <input type="text" class="search-box" id="search" placeholder="Search tracks..." oninput="filterSongs()">
        </div>
        <div class="list" id="list"></div>

        <div class="dock">
            <div class="seek-panel">
                <div class="bar-bg" id="seek-base" onclick="seek(event)"><div class="bar-fill" id="fill"></div></div>
                <div class="time-meta">
                    <span id="time-cur">0:00</span>
                    <span id="time-total">0:00</span>
                </div>
            </div>
            <div class="dock-controls">
                <div class="now-playing-meta"><p id="cur-title">V-CORE Standby</p></div>
                <div class="c-btns">
                    <div class="c-icon" onclick="prev()">⏮</div>
                    <div class="play-main" id="playBtn" onclick="toggle()">▶</div>
                    <div class="c-icon" onclick="next()">⏭</div>
                </div>
            </div>
        </div>
    </div>

    <audio id="player" crossorigin="anonymous"></audio>

    <script>
        const USER = "forpc1428-eng";
        const REPO = "SONGS";
        const API = `https://api.github.com/repos/${USER}/${REPO}/contents/`;
        
        const audio = document.getElementById('player');
        let allSongs = [];
        let currentSongs = [];
        let currentIdx = -1;

        async function ignite() {
            // Unlock audio context for mobile
            audio.play().then(() => audio.pause());
            
            // Seamless transition
            document.getElementById('portal').style.opacity = "0";
            setTimeout(() => document.getElementById('portal').style.display = "none", 1000);
            
            // Start the cloud engine
            load();
        }

        async function load() {
            const res = await fetch(API);
            const data = await res.json();
            
            allSongs = data
                .filter(f => f.name.toLowerCase().endsWith('.mp3'))
                .map(f => ({
                    name: f.name.replace('.mp3', '').replace(/_/g, ' '),
                    // Generate High-Speed Media CDN URL
                    url: `https://media.githubusercontent.com/media/${USER}/${REPO}/main/${encodeURIComponent(f.name)}`
                }));
                
            currentSongs = [...allSongs];
            render();
        }

        function render() {
            const list = document.getElementById('list');
            list.innerHTML = currentSongs.map((s, i) => `
                <div class="track ${i === currentIdx ? 'active' : ''}" onclick="playSong(${i})">
                    <div class="track-num">${(i+1).toString().padStart(2, '0')}</div>
                    <div class="track-info"><p class="track-name">${s.name}</p></div>
                </div>
            `).join('');
        }

        function filterSongs() {
            const query = document.getElementById('search').value.toLowerCase();
            currentSongs = allSongs.filter(s => s.name.toLowerCase().includes(query));
            render();
        }

        // --- TIME FORMATTING ---
        function formatTime(seconds) {
            const m = Math.floor(seconds / 60);
            const sec = Math.floor(seconds % 60);
            return `${m}:${sec < 10 ? '0' : ''}${sec}`;
        }

        function playSong(i) {
            currentIdx = i;
            const song = currentSongs[i];
            
            audio.src = song.url;
            audio.play();
            
            document.getElementById('cur-title').innerText = song.name;
            document.getElementById('playBtn').innerText = "⏸";
            render();
            updateMediaSession(song);
        }

        function toggle() {
            if (currentIdx === -1) return playSong(0);
            if (audio.paused) { audio.play(); document.getElementById('playBtn').innerText = "⏸"; }
            else { audio.pause(); document.getElementById('playBtn').innerText = "▶"; }
        }

        function next() { if(currentIdx < currentSongs.length - 1) playSong(currentIdx + 1); }
        function prev() { if(currentIdx > 0) playSong(currentIdx - 1); }

        // --- SEEK LOGIC ---
        function seek(e) {
            const rect = document.getElementById('seek-base').getBoundingClientRect();
            const p = (e.clientX - rect.left) / rect.width;
            audio.currentTime = p * audio.duration;
        }

        // --- MEDIASESSION (Background Play) ---
        function updateMediaSession(song) {
            if ('mediaSession' in navigator) {
                navigator.mediaSession.metadata = new MediaMetadata({
                    title: song.name,
                    artist: 'V-CORE Infinity',
                    album: 'Private Library',
                    artwork: [{ src: 'https://via.placeholder.com/512/FFFFFF/000000?text=V', sizes: '512x512', type: 'image/png' }]
                });
                navigator.mediaSession.setActionHandler('play', () => toggle());
                navigator.mediaSession.setActionHandler('pause', () => toggle());
                navigator.mediaSession.setActionHandler('previoustrack', () => prev());
                navigator.mediaSession.setActionHandler('nexttrack', () => next());
            }
        }

        // --- THE PERFECT SYNC BAR ---
        audio.ontimeupdate = () => {
            if (!isNaN(audio.duration)) {
                const p = (audio.currentTime / audio.duration) * 100;
                document.getElementById('fill').style.width = p + "%";
                document.getElementById('time-cur').innerText = formatTime(audio.currentTime);
                document.getElementById('time-total').innerText = formatTime(audio.duration);
            }
        };
        
        // --- AUTO-NEXT ---
        audio.onended = () => next();
    </script>
</body>
</html>
