<!DOCTYPE html>
<html>
<head>
<title>Music</title>
<style>
body{background:#000;color:#fff;font-family:Arial}
.song{padding:14px;border-bottom:1px solid #222;cursor:pointer}
.active{background:#222}
.player{position:fixed;bottom:0;width:100%;background:#111;padding:10px}
</style>
</head>
<body>

<h2>🎧 My Music</h2>

<div id="songs"></div>

<div class="player">
<span id="now">Nothing Playing</span>
<button onclick="prev()">Prev</button>
<button onclick="toggle()">Play/Pause</button>
<button onclick="next()">Next</button>
</div>

<audio id="audio"></audio>

<script>
const API = "https://script.google.com/macros/s/AKfycbxjKDwiQuQ8qPyfVjCo4c6pQSMDAVHCC3fpaUieJMe8-Vcoiq6r8dgjAjl0iZ6TDyr4/exec";

let songs = [];
let current = -1;

const audio = document.getElementById("audio");

async function load(){
  const res = await fetch(API);
  songs = await res.json();
  render();
}

function render(){
  const el = document.getElementById("songs");
  el.innerHTML = "";

  songs.forEach((s,i)=>{
    const div = document.createElement("div");
    div.className="song";
    div.innerText=s.name; // 🔥 uses sheet name
    div.onclick=()=>play(i);
    el.appendChild(div);
  });
}

async function play(i){
  current=i;
  audio.src=songs[i].link;
  await audio.play();
  update();
}

function update(){
  document.getElementById("now").innerText = songs[current]?.name || "Nothing Playing";
  document.querySelectorAll(".song").forEach((e,i)=>{
    e.classList.toggle("active", i===current);
  });
}

function toggle(){
  audio.paused?audio.play():audio.pause();
}

function next(){
  if(current < songs.length-1) play(current+1);
}

function prev(){
  if(current > 0) play(current-1);
}

audio.onended = next;

load();
</script>

</body>
</html>
