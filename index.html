<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>V-CORE AURORA</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&family=Playfair+Display:wght@900&display=swap" rel="stylesheet">
    <style>
        :root { --glass: rgba(255, 255, 255, 0.05); --border: rgba(255, 255, 255, 0.1); }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; -webkit-tap-highlight-color: transparent; }
        
        body { background: #000; color: #fff; height: 100vh; overflow: hidden; position: fixed; width: 100%; }

        /* 1 Billion Dollar Background - Smooth Aurora */
        .aurora-bg {
            position: fixed; inset: 0; z-index: -1;
            background: linear-gradient(45deg, #0f0c29, #302b63, #24243e);
            filter: contrast(1.2);
        }
        .blob {
            position: absolute; width: 500px; height: 500px; border-radius: 50%;
            filter: blur(80px); opacity: 0.4; animation: move 20s infinite alternate;
        }
        .b1 { background: #ff0080; top: -10%; left: -10%; }
        .b2 { background: #7928ca; bottom: -10%; right: -10%; animation-delay: -5s; }
        .b3 { background: #0070f3; top: 40%; left: 30%; animation-delay: -10s; }
        @keyframes move { from { transform: translate(0,0) scale(1); } to { transform: translate(100px, 100px) scale(1.2); } }

        /* UI Structure */
        .container { display: flex; flex-direction: column; height: 100vh; padding-top: env(safe-area-inset-top); }
        header { padding: 40px 25px 10px; }
        header h1 { font-family: 'Playfair Display'; font-size: 3.2rem; background: linear-gradient(to right, #fff, #888); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        .search-area { padding: 0 25px 20px; }
        .search-box { 
            width: 100%; padding: 16px 24px; background: var(--glass); border: 1px solid var(--border); 
            border-radius: 20px; color: #fff; backdrop-filter: blur(20px); outline: none; transition: 0.3s;
        }

        /* Lightning Fast List */
        .list { 
            flex: 1; overflow-y: auto; padding: 0 25px 220px; scrollbar-width: none;
            will-change: transform; /* Hardware acceleration */
        }
        .list::-webkit-scrollbar { display: none; }
        
        .track { 
            display: flex; align-items: center; padding: 18px; background: var(--glass); 
            border-radius: 22px; margin-bottom: 12px; border: 1px solid var(--border); 
            transition: 0.2s transform; backdrop-filter: blur(10px);
        }
        .track.active { background: #fff; color: #000; border-color: #fff; transform: scale(0.97); }
        .track-info { flex: 1; overflow: hidden; margin-left: 15px; }
        .track-name { font-weight: 800; font-size: 0.95rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        /* Pro Master Dock */
        .dock { 
            position: fixed; bottom: 20px; left: 20px; right: 20px; 
            background: rgba(10, 10, 10, 0.7); backdrop-filter: blur(30px); 
            border: 1px solid var(--border); border-radius: 35px; padding: 25px; z-index: 1000;
        }

        /* Seek Bar System */
        .seek-container { margin-bottom: 20px; }
        .bar-bg { width: 100%; height: 6px; background: rgba(255,255,255,0.1); border-radius: 10px; position: relative; cursor: pointer; }
        .bar-fill { height: 100%; background: #fff; width: 0%; border-radius: 10px; box-shadow: 0 0 20px #fff; position: relative; }
        .bar-fill::after { content: ''; position: absolute; right: -5px; top: -4px; width: 14px; height: 14px; background: #fff; border-radius: 50%; box-shadow: 0 0 10px #fff; }
        
        .time-info { display: flex; justify-content: space-between; margin-top: 8px; font-size: 0.7rem; font-weight: 700; opacity: 0.6; letter-spacing: 1px; }

        .dock-controls { display: flex; align-items: center; justify-content: space-between; }
        .song-meta { flex: 1; overflow: hidden; margin-right: 15px; }
        #cur-t { font-weight: 800; font-size: 1.1rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        
        .btns { display: flex; align-items: center; gap: 20px; }
        .play-main { 
            width: 55px; height: 55px; background: #fff; color: #000; border-radius: 50%; 
            display: flex; align-items: center; justify-content: center; font-size: 1.2rem;
        }
    </style>
</head>
<body>

    <div class="aurora-bg">
        <div class="blob b1"></div><div class="blob b2"></div><div class="blob b3"></div>
    </div>

    <div id="portal" onclick="ignite()" style="position:fixed; inset:0; z-index:9999; background:#000; display:flex; align-items:center; justify-content:center; transition:1s;">
        <h2 style="letter-spacing:15px; font-weight:900; animation: pulse 2s infinite;">V-CORE</h2>
    </div>

    <div class="container">
        <header><h1>LIBRARY</h1></header>
        <div class="search-area">
            <input type="text" class="search-box" id="search" placeholder="Search 100+ tracks..." oninput="filterSongs()">
        </div>
        <div class="list" id="list"></div>

        <div class="dock">
            <div class="seek-container">
                <div class="bar-bg" id="bar-base" onclick="seek(event)"><div class="bar-fill" id="fill"></div></div>
                <div class="time-info">
                    <span id="time-cur">0:00</span>
                    <span id="time-total">0:00</span>
                </div>
            </div>
            <div class="dock-controls">
                <div class="song-meta"><p id="cur-t">Select a Track</p></div>
                <div class="btns">
                    <div onclick="prev()" style="font-size:1.5rem">⏮</div>
                    <div class="play-main" id="playBtn" onclick="toggle()">▶</div>
                    <div onclick="next()" style="font-size:1.5rem">⏭</div>
                </div>
            </div>
        </div>
    </div>

    <audio id="player" crossorigin="anonymous"></audio>

    <script>
        const USER = "forpc1428-eng", REPO = "SONGS";
        const API = `https://api.github.com/repos/${USER}/${REPO}/contents/`;
        const audio = document.getElementById('player');
        let allSongs = [], currentSongs = [], currentIdx = -1;

        async function ignite() {
            audio.play().then(() => audio.pause());
            document.getElementById('portal').style.opacity = "0";
            setTimeout(() => document.getElementById('portal').style.display = "none", 1000);
            load();
        }

        async function load() {
            const res = await fetch(API);
            const data = await res.json();
            allSongs = data.filter(f => f.name.endsWith('.mp3')).map(f => ({
                name: f.name.replace('.mp3', '').replace(/_/g, ' '),
                url: `https://media.githubusercontent.com/media/${USER}/${REPO}/main/${encodeURIComponent(f.name)}`
            }));
            currentSongs = [...allSongs];
            render();
        }

        function render() {
            const list = document.getElementById('list');
            list.innerHTML = currentSongs.map((s, i) => `
                <div class="track ${i === currentIdx ? 'active' : ''}" onclick="playSong(${i})">
                    <div style="font-weight:900; opacity:0.3; font-size:0.7rem">${(i+1)}</div>
                    <div class="track-info"><p class="track-name">${s.name}</p></div>
                </div>
            `).join('');
        }

        function filterSongs() {
            const q = document.getElementById('search').value.toLowerCase();
            currentSongs = allSongs.filter(s => s.name.toLowerCase().includes(q));
            render();
        }

        function formatTime(s) {
            const m = Math.floor(s / 60);
            const sec = Math.floor(s % 60);
            return `${m}:${sec < 10 ? '0' : ''}${sec}`;
        }

        function playSong(i) {
            currentIdx = i;
            audio.src = currentSongs[i].url;
            audio.play();
            document.getElementById('cur-t').innerText = currentSongs[i].name;
            document.getElementById('playBtn').innerText = "⏸";
            render();
        }

        function toggle() {
            if (currentIdx === -1) return playSong(0);
            audio.paused ? (audio.play(), document.getElementById('playBtn').innerText = "⏸") : (audio.pause(), document.getElementById('playBtn').innerText = "▶");
        }

        function next() { if(currentIdx < currentSongs.length-1) playSong(currentIdx+1); }
        function prev() { if(currentIdx > 0) playSong(currentIdx-1); }

        function seek(e) {
            const rect = document.getElementById('bar-base').getBoundingClientRect();
            audio.currentTime = ((e.clientX - rect.left) / rect.width) * audio.duration;
        }

        audio.ontimeupdate = () => {
            const p = (audio.currentTime / audio.duration) * 100;
            document.getElementById('fill').style.width = p + "%";
            document.getElementById('time-cur').innerText = formatTime(audio.currentTime);
            if(!isNaN(audio.duration)) document.getElementById('time-total').innerText = formatTime(audio.duration);
        };
        audio.onended = () => next();
    </script>
</body>
</html>
