<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>V-CORE ULTIMATE</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Playfair+Display:wght@900&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #fff; --glass: rgba(255,255,255,0.03); --border: rgba(255,255,255,0.08); --bg: #000; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: #fff; height: 100vh; overflow: hidden; position: fixed; width: 100%; }

        /* Cinematic Entrance */
        #portal { position: fixed; inset: 0; z-index: 1000; background: #000; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: 1s cubic-bezier(0.19, 1, 0.22, 1); }
        .v-orb { width: 100px; height: 100px; border: 1px solid #fff; border-radius: 50%; display: flex; align-items: center; justify-content: center; box-shadow: 0 0 50px rgba(255,255,255,0.1); cursor: pointer; }
        .v-orb span { font-family: 'Playfair Display'; font-size: 2.5rem; }

        /* Header & Search */
        .container { display: flex; flex-direction: column; height: 100vh; padding-top: env(safe-area-inset-top); }
        header { padding: 40px 25px 10px; }
        header h1 { font-family: 'Playfair Display'; font-size: 3rem; margin-bottom: 10px; }
        .search-box { width: 100%; padding: 15px 20px; background: var(--glass); border: 1px solid var(--border); border-radius: 15px; color: #fff; margin-bottom: 20px; outline: none; transition: 0.3s; }
        .search-box:focus { border-color: #fff; background: rgba(255,255,255,0.08); }

        /* List Area */
        .list { flex: 1; overflow-y: auto; padding: 0 20px 200px; scrollbar-width: none; }
        .list::-webkit-scrollbar { display: none; }
        
        .track { display: flex; align-items: center; padding: 18px; background: var(--glass); border-radius: 20px; margin-bottom: 10px; border: 1px solid var(--border); transition: 0.2s; position: relative; overflow: hidden; }
        .track.active { background: #fff; color: #000; border-color: #fff; box-shadow: 0 10px 30px rgba(255,255,255,0.1); }
        .track-num { font-weight: 900; font-size: 0.7rem; width: 30px; opacity: 0.4; }
        .track-info { flex: 1; overflow: hidden; }
        .track-name { font-weight: 700; font-size: 0.95rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        
        /* Premium Dock */
        .dock { position: fixed; bottom: 0; width: 100%; background: rgba(5,5,5,0.8); backdrop-filter: blur(30px); border-top: 1px solid var(--border); padding: 20px 25px calc(30px + env(safe-area-inset-bottom)); z-index: 500; }
        .prog-container { position: absolute; top: 0; left: 0; width: 100%; height: 3px; background: rgba(255,255,255,0.05); cursor: pointer; }
        .prog-fill { height: 100%; background: #fff; width: 0%; box-shadow: 0 0 15px #fff; }
        
        .dock-main { display: flex; align-items: center; justify-content: space-between; }
        .now-playing-meta { flex: 1; margin-right: 20px; overflow: hidden; }
        #cur-title { font-family: 'Playfair Display'; font-size: 1.1rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        
        .controls { display: flex; align-items: center; gap: 25px; }
        .c-btn { font-size: 1.4rem; cursor: pointer; opacity: 0.7; transition: 0.2s; }
        .c-btn:active { transform: scale(0.8); }
        .play-main { width: 55px; height: 55px; background: #fff; color: #000; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; }

        /* Mobile Pulse Effect */
        @keyframes pulse { 0% { opacity: 0.5; } 50% { opacity: 1; } 100% { opacity: 0.5; } }
        .playing .track-num { animation: pulse 1s infinite; color: #000; }
    </style>
</head>
<body>

    <div id="portal" onclick="ignite()">
        <div class="v-orb"><span>V</span></div>
        <p style="margin-top:20px; letter-spacing:10px; font-size:0.6rem; opacity:0.5;">VEDANT CORE</p>
    </div>

    <div class="container">
        <header>
            <h1>SONGS</h1>
            <input type="text" class="search-box" id="search" placeholder="Search track..." oninput="filterSongs()">
        </header>

        <div class="list" id="list"></div>

        <div class="dock">
            <div class="prog-container" onclick="seek(event)"><div class="prog-fill" id="fill"></div></div>
            <div class="dock-main">
                <div class="now-playing-meta">
                    <p id="cur-title">V-CORE Standby</p>
                </div>
                <div class="controls">
                    <div class="c-btn" onclick="prev()">⏮</div>
                    <div class="play-main" id="playBtn" onclick="toggle()">▶</div>
                    <div class="c-btn" onclick="next()">⏭</div>
                </div>
            </div>
        </div>
    </div>

    <audio id="player" crossorigin="anonymous"></audio>

    <script>
        const USER = "forpc1428-eng";
        const REPO = "SONGS";
        const API = `https://api.github.com/repos/${USER}/${REPO}/contents/`;
        
        const audio = document.getElementById('player');
        let allSongs = [];
        let currentSongs = [];
        let currentIdx = -1;

        async function ignite() {
            audio.play().then(() => audio.pause());
            document.getElementById('portal').style.transform = "translateY(-100%)";
            load();
        }

        async function load() {
            try {
                const res = await fetch(API);
                const data = await res.json();
                allSongs = data
                    .filter(f => f.name.toLowerCase().endsWith('.mp3'))
                    .map(f => ({
                        name: f.name.replace('.mp3', '').replace(/_/g, ' '),
                        url: `https://media.githubusercontent.com/media/${USER}/${REPO}/main/${encodeURIComponent(f.name)}`
                    }));
                currentSongs = [...allSongs];
                render();
            } catch (e) { console.error(e); }
        }

        function render() {
            document.getElementById('list').innerHTML = currentSongs.map((s, i) => `
                <div class="track ${i === currentIdx ? 'active' : ''}" onclick="playSong(${i})">
                    <div class="track-num">${(i+1).toString().padStart(2, '0')}</div>
                    <div class="track-info"><p class="track-name">${s.name}</p></div>
                </div>
            `).join('');
        }

        function filterSongs() {
            const query = document.getElementById('search').value.toLowerCase();
            currentSongs = allSongs.filter(s => s.name.toLowerCase().includes(query));
            render();
        }

        function playSong(i) {
            currentIdx = i;
            const song = currentSongs[i];
            audio.src = song.url;
            audio.play();
            document.getElementById('cur-title').innerText = song.title;
            document.getElementById('playBtn').innerText = "⏸";
            render();
            updateMediaSession(song);
        }

        function toggle() {
            if (currentIdx === -1) { playSong(0); return; }
            if (audio.paused) { audio.play(); document.getElementById('playBtn').innerText = "⏸"; }
            else { audio.pause(); document.getElementById('playBtn').innerText = "▶"; }
        }

        function next() { if(currentIdx < currentSongs.length - 1) playSong(currentIdx + 1); }
        function prev() { if(currentIdx > 0) playSong(currentIdx - 1); }

        function seek(e) {
            const p = e.clientX / window.innerWidth;
            audio.currentTime = p * audio.duration;
        }

        // BACKGROUND PLAY (Lock Screen Controls)
        function updateMediaSession(song) {
            if ('mediaSession' in navigator) {
                navigator.mediaSession.metadata = new MediaMetadata({
                    title: song.name,
                    artist: 'V-CORE Library',
                    album: 'GitHub Cloud',
                    artwork: [{ src: 'https://via.placeholder.com/512/FFFFFF/000000?text=V', sizes: '512x512', type: 'image/png' }]
                });
                navigator.mediaSession.setActionHandler('play', () => toggle());
                navigator.mediaSession.setActionHandler('pause', () => toggle());
                navigator.mediaSession.setActionHandler('previoustrack', () => prev());
                navigator.mediaSession.setActionHandler('nexttrack', () => next());
            }
        }

        audio.ontimeupdate = () => {
            const p = (audio.currentTime / audio.duration) * 100;
            document.getElementById('fill').style.width = p + "%";
        };
        audio.onended = () => next();
    </script>
</body>
</html>
