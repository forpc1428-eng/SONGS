<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>V-CORE INFINITY ULTRA</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&family=Playfair+Display:wght@900&display=swap" rel="stylesheet">

<style>
:root{
--glass:rgba(255,255,255,0.05);
--border:rgba(255,255,255,0.12);
--glow:0 0 40px rgba(255,255,255,0.15);
--font:'Plus Jakarta Sans',sans-serif;
}

*{margin:0;padding:0;box-sizing:border-box;font-family:var(--font)}
body{
background:#020202;
color:#fff;
overflow:hidden;
}

/* CINEMATIC BACKGROUND */
.bg{
position:fixed;inset:0;
background:radial-gradient(circle at 20% 30%,#111,transparent 60%),
radial-gradient(circle at 80% 70%,#0a0a0a,transparent 60%),
#000;
z-index:-2;
}

.noise{
position:fixed;inset:0;
background:url('https://grainy-gradients.vercel.app/noise.svg');
opacity:0.05;
z-index:-1;
}

.container{height:100vh;display:flex;flex-direction:column}

header{padding:40px 25px}
header h1{
font-family:'Playfair Display';
font-size:3.8rem;
letter-spacing:-2px;
background:linear-gradient(90deg,#fff,#888);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.search-box{
margin:0 25px 20px;
padding:18px;
border-radius:25px;
background:var(--glass);
border:1px solid var(--border);
backdrop-filter:blur(25px);
color:#fff;
outline:none;
box-shadow:var(--glow);
}

.list{
flex:1;
overflow:auto;
padding:0 25px 200px;
}

.track{
padding:22px;
margin-bottom:12px;
border-radius:25px;
background:linear-gradient(145deg,rgba(255,255,255,0.04),rgba(255,255,255,0.01));
border:1px solid var(--border);
backdrop-filter:blur(20px);
transition:0.3s;
cursor:pointer;
}

.track:hover{
transform:translateY(-3px) scale(1.01);
box-shadow:0 10px 40px rgba(255,255,255,0.08);
}

.track.active{
background:#fff;
color:#000;
}

.track-name{font-weight:700}

/* DOCK */
.dock{
position:fixed;
bottom:20px;left:20px;right:20px;
padding:25px;
border-radius:35px;
background:rgba(10,10,10,0.75);
backdrop-filter:blur(40px);
border:1px solid var(--border);
box-shadow:0 20px 80px rgba(0,0,0,0.7);
}

.bar-bg{
height:6px;
background:rgba(255,255,255,0.1);
border-radius:10px;
}

.bar-fill{
height:100%;
background:#fff;
width:0;
border-radius:10px;
box-shadow:0 0 25px #fff;
}

.controls{
display:flex;
justify-content:space-between;
align-items:center;
margin-top:15px;
}

.play{
width:60px;height:60px;
border-radius:50%;
background:#fff;
color:#000;
display:flex;
align-items:center;
justify-content:center;
cursor:pointer;
transition:0.2s;
}

.play:active{transform:scale(0.9)}

</style>
</head>

<body>

<div class="bg"></div>
<div class="noise"></div>

<div class="container">
<header><h1>LIBRARY</h1></header>
<input id="search" class="search-box" placeholder="Search tracks..." oninput="filterSongs()">
<div id="list" class="list"></div>

<div class="dock">
<div class="bar-bg" onclick="seek(event)"><div id="fill" class="bar-fill"></div></div>
<div class="controls">
<div id="cur-title">Standby</div>
<div style="display:flex;gap:20px;align-items:center">
<div onclick="prev()">⏮</div>
<div id="playBtn" class="play" onclick="toggle()">▶</div>
<div onclick="next()">⏭</div>
</div>
</div>
</div>
</div>

<audio id="player"></audio>

<script>
const USER="forpc1428-eng";
const REPO="SONGS";
const API=`https://api.github.com/repos/${USER}/${REPO}/contents/`;

const audio=document.getElementById('player');
let allSongs=[];
let currentSongs=[];
let currentIdx=-1;

async function load(){
const res=await fetch(API);
const data=await res.json();
allSongs=data.filter(f=>f.name.endsWith('.mp3')).map(f=>({
name:f.name.replace('.mp3',''),
url:`https://media.githubusercontent.com/media/${USER}/${REPO}/main/${encodeURIComponent(f.name)}`
}));
currentSongs=[...allSongs];
render();
}

function render(){
list.innerHTML=currentSongs.map((s,i)=>`<div class="track ${i===currentIdx?'active':''}" onclick="playSong(${i})"><div class="track-name">${s.name}</div></div>`).join('');
}

function filterSongs(){
const q=search.value.toLowerCase();
currentSongs=allSongs.filter(s=>s.name.toLowerCase().includes(q));
render();
}

function playSong(i){
currentIdx=i;
const s=currentSongs[i];
audio.src=s.url;
audio.play();
cur-title.innerText=s.name;
playBtn.innerText="⏸";
render();
}

function toggle(){
if(currentIdx===-1)return playSong(0);
if(audio.paused){audio.play();playBtn.innerText="⏸"}
else{audio.pause();playBtn.innerText="▶"}
}

function next(){if(currentIdx<currentSongs.length-1)playSong(currentIdx+1)}
function prev(){if(currentIdx>0)playSong(currentIdx-1)}

function seek(e){
const rect=e.currentTarget.getBoundingClientRect();
audio.currentTime=((e.clientX-rect.left)/rect.width)*audio.duration;
}

audio.ontimeupdate=()=>{
if(!isNaN(audio.duration)){
fill.style.width=(audio.currentTime/audio.duration*100)+"%";
}
}

audio.onended=()=>next();

load();
</script>

</body>
</html>
