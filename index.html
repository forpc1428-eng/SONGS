<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VEDANT PLAYER</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@100;900&family=Playfair+Display:wght@900&family=Fraunces:wght@100;900&family=Bebas+Neue&family=Orbitron&family=Oswald&family=Raleway:wght@100;900&family=Montserrat:wght@100;900&family=Poppins:wght@100;900&family=Libre+Baskerville&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Inter;}
body{background:#000;color:#fff;overflow:hidden}

/* ===== PORTAL (LIQUID EXIT) ===== */
#portal{
position:fixed;inset:0;z-index:10000;
background:#fff;
background-image:url('https://ik.imagekit.io/22h7wv5o2/doodle.jpg?updatedAt=1773773281436');
background-size:500px;
display:flex;align-items:center;justify-content:center;
animation:doodleScroll 80s linear infinite;
transition:all 2.5s cubic-bezier(.2,.8,.2,1);
}
@keyframes doodleScroll{
from{background-position:0 0;}
to{background-position:400px 400px;}
}

.melt-exit{
transform:scale(0.6) translateY(-60px);
filter:blur(25px);
animation:liquidWarp 2.5s forwards;
box-shadow:0 80px 120px rgba(0,0,0,0.6);
}

@keyframes liquidWarp{
0%{border-radius:0%}
50%{border-radius:50% 30% 60% 40%}
100%{border-radius:100%}
}

/* ===== BG ===== */
.chameleon-bg{
position:fixed;inset:0;z-index:-1;
background:linear-gradient(120deg,#050505,#0a0a0a,#050505);
background-size:600% 600%;
animation:softShift 60s ease infinite;
}
@keyframes softShift{
0%{background-color:hsl(0,25%,6%)}
25%{background-color:hsl(260,25%,6%)}
50%{background-color:hsl(180,25%,6%)}
75%{background-color:hsl(90,25%,6%)}
100%{background-color:hsl(360,25%,6%)}
}

/* ===== HEADER ===== */
header{padding:60px 30px;}
#header-text{position:relative;height:5rem;}
.font-layer{
position:absolute;inset:0;
opacity:0;
transition:opacity 2.5s ease;
}
.font-layer.active{opacity:1}

/* ===== LIST ===== */
.scroll-list{flex:1;overflow:auto;padding:20px;}
.track-card{
position:relative;
padding:20px;
margin-bottom:14px;
border-radius:25px;
background:rgba(255,255,255,0.05);
transform-style:preserve-3d;
transition:.2s;
overflow:hidden;
}

/* GLASS REFLECTION */
.track-card::after{
content:"";
position:absolute;inset:0;
background:linear-gradient(120deg,transparent,rgba(255,255,255,0.2),transparent);
transform:translateX(-100%);
transition:.6s;
}
.track-card:hover::after{
transform:translateX(100%);
}

/* AUDIO REACTIVE GLOW */
.track-card.active{
box-shadow:0 0 40px rgba(0,255,255,0.2);
}

/* ===== PLAYER ===== */
.dock{
position:fixed;bottom:20px;left:20px;right:20px;
background:rgba(10,10,10,.7);
padding:20px;border-radius:40px;
backdrop-filter:blur(40px);
}
.controls{display:flex;gap:20px;align-items:center;}
.shuffle{font-size:1.5rem;cursor:pointer;}
.shuffle.active{color:#00f2ff;}
.rail{height:6px;background:#333;border-radius:10px;cursor:pointer;}
.fill{height:100%;width:0;background:#fff;}
</style>
</head>

<body>

<div id="portal" onclick="ignite()">
<div style="background:#fff;color:#000;padding:50px;border:10px solid #000;">
<h1 style="font-family:Bebas Neue;font-size:5rem;">VEDANT</h1>
</div>
</div>

<div class="chameleon-bg"></div>

<div id="app" style="opacity:0;transition:2s;display:flex;flex-direction:column;height:100vh">

<header id="header-text"></header>

<div class="scroll-list" id="list"></div>

<div class="dock">
<div class="rail" id="rail"><div class="fill" id="fill"></div></div>

<div style="display:flex;justify-content:space-between;margin-top:15px">
<p id="track-name">---</p>

<div class="controls">
<div id="shuffleBtn" class="shuffle">🔀</div>
<div onclick="prev()">⏮</div>
<div onclick="toggle()">▶</div>
<div onclick="next()">⏭</div>
</div>

</div>
</div>

</div>

<audio id="player"></audio>

<script>
const audio=document.getElementById('player');
let songs=[],currentIdx=0,shuffle=false,analyzer,data;

/* ===== AUDIO ENGINE ===== */
function initAudio(){
const ctx=new (window.AudioContext||window.webkitAudioContext)();
const src=ctx.createMediaElementSource(audio);
analyzer=ctx.createAnalyser();
src.connect(analyzer);
analyzer.connect(ctx.destination);
analyzer.fftSize=64;
data=new Uint8Array(analyzer.frequencyBinCount);
react();
}

function react(){
requestAnimationFrame(react);
if(!analyzer)return;
analyzer.getByteFrequencyData(data);
const bass=data[2]/255;

document.querySelectorAll('.track-card').forEach(c=>{
c.style.transform=`translateY(${bass*5}px) scale(${1+bass*0.05})`;
});
}

/* ===== FONT FADE ===== */
const fonts=["Playfair Display","Inter","Fraunces","Bebas Neue","Orbitron","Oswald","Raleway","Montserrat","Poppins","Libre Baskerville"];
const header=document.getElementById('header-text');
fonts.forEach(f=>{
const d=document.createElement('div');
d.className="font-layer";
d.style.fontFamily=f;
d.innerHTML="VEDANT'S<br>PLAYLIST";
header.appendChild(d);
});
let fi=0;
setInterval(()=>{
const layers=document.querySelectorAll('.font-layer');
layers.forEach(l=>l.classList.remove('active'));
layers[fi%layers.length].classList.add('active');
fi++;
},4000);

/* ===== PORTAL ===== */
function ignite(){
document.getElementById('portal').classList.add('melt-exit');
document.getElementById('app').style.opacity=1;
initAudio();
loadSongs();
}

/* ===== SONGS ===== */
async function loadSongs(){
const res=await fetch(`https://api.github.com/repos/forpc1428-eng/SONGS/contents/`);
const data=await res.json();
songs=data.filter(f=>f.name.endsWith('.mp3')).map(f=>({
name:f.name,url:`https://media.githubusercontent.com/media/forpc1428-eng/SONGS/main/${encodeURIComponent(f.name)}`
}));
renderList();
}

function renderList(){
document.getElementById('list').innerHTML=songs.map((s,i)=>`
<div class="track-card" onclick="playSong(${i})">${s.name}</div>
`).join('');
}

/* ===== PLAYER ===== */
function playSong(i){
currentIdx=i;
audio.src=songs[i].url;
audio.play();
document.getElementById('track-name').innerText=songs[i].name;
document.querySelectorAll('.track-card').forEach(c=>c.classList.remove('active'));
document.querySelectorAll('.track-card')[i].classList.add('active');
}

function toggle(){audio.paused?audio.play():audio.pause();}
function next(){shuffle?playSong(Math.random()*songs.length|0):playSong((currentIdx+1)%songs.length);}
function prev(){playSong((currentIdx-1+songs.length)%songs.length);}

/* ===== SHUFFLE ===== */
document.getElementById('shuffleBtn').onclick=()=>{
shuffle=!shuffle;
document.getElementById('shuffleBtn').classList.toggle('active');
};

/* ===== SLIDER ===== */
const rail=document.getElementById('rail');
rail.onmousemove=e=>{
if(e.buttons){
const r=rail.getBoundingClientRect();
audio.currentTime=((e.clientX-r.left)/r.width)*audio.duration;
}
};

audio.ontimeupdate=()=>{
document.getElementById('fill').style.width=(audio.currentTime/audio.duration)*100+"%";
};

/* ===== 3D TILT ===== */
function tilt(x,y){
document.querySelectorAll('.track-card').forEach(c=>{
c.style.transform+=` rotateX(${y*10}deg) rotateY(${x*10}deg)`;
});
}

window.onmousemove=e=>{
tilt((e.clientX/window.innerWidth)-0.5,(e.clientY/window.innerHeight)-0.5);
};

if(window.DeviceOrientationEvent){
window.addEventListener('deviceorientation',e=>{
tilt(e.gamma/30,e.beta/30);
});
}
</script>

</body>
</html>
