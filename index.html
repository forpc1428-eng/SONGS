<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Vedant Music Player</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0f2027;
      background: linear-gradient(to right, #2c5364, #203a43, #0f2027);
      color: #fff;
      text-align: center;
      padding: 20px;
    }
    .song-list {
      margin-top: 20px;
    }
    .song {
      margin: 10px 0;
      cursor: pointer;
      padding: 8px;
      border-radius: 5px;
      background: rgba(255,255,255,0.1);
    }
    .song:hover {
      background: rgba(255,255,255,0.2);
    }
    audio {
      margin-top: 20px;
      width: 80%;
    }
  </style>
</head>
<body>
  <h1>🎵 Vedant Music Player</h1>
  <div id="songList" class="song-list"></div>
  <audio id="player" controls></audio>

  <script>
    const API_URL = "https://script.google.com/macros/s/AKfycbxjKDwiQuQ8qPyfVjCo4c6pQSMDAVHCC3fpaUieJMe8-Vcoiq6r8dgjAjl0iZ6TDyr4/exec";
    const songListDiv = document.getElementById("songList");
    const player = document.getElementById("player");

    async function loadSongs() {
      try {
        const res = await fetch(API_URL);
        const songs = await res.json();

        songs.forEach((song, index) => {
          const div = document.createElement("div");
          div.className = "song";
          div.textContent = `▶ ${song.name}`;
          div.onclick = () => {
            player.src = song.link;
            player.play();
          };
          songListDiv.appendChild(div);
        });
      } catch (err) {
        songListDiv.textContent = "Error loading songs.";
        console.error(err);
      }
    }

    loadSongs();
  </script>
</body>
</html>
